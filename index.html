async function doAuth(){
  const get=id=>{const el=document.getElementById(id);return el?(el.value||"").trim():"";};
  const email=get("authEmail").toLowerCase();
  const pass=get("authPass");
  const err=document.getElementById("authErr");
  if(err){err.style.color="#B4453A";err.textContent="";}
  if(!email||!pass){if(err)err.textContent="Renseigne ton email et ton mot de passe.";return;}
  if(pass.length<6){if(err)err.textContent="Mot de passe : 6 caractères minimum.";return;}
  const isSignup=state.authMode==="signup";
  // Collecte des champs profil au signup
  const profileData=isSignup?{
    prenom:get("authPrenom"),nom:get("authNom"),phone:get("authPhone"),
    birthdate:get("authBirth")||null,genre:get("authGenre")||null,
    ville:get("authVille")||null,adresse:get("authAdresse")||null,
    univ:get("authUniv")||"uca",faculte:get("authFaculte"),
    annee:get("authAnnee")||"L1",semestre:get("authSemestre")||"S1",
    linkedin:get("authLinkedin")||null
  }:null;
  if(isSignup){
    if(!profileData.prenom||!profileData.nom){if(err)err.textContent="Prénom et nom requis.";return;}
    if(!profileData.faculte){if(err)err.textContent="Choisis ta filière.";return;}
  }
  if(sb){
    try{
      const {data,error}=await (isSignup?sb.auth.signUp({email,password:pass}):sb.auth.signInWithPassword({email,password:pass}));
      if(error){if(err)err.textContent=error.message;return;}
      // Si signup → on stocke en localStorage les champs profil, ils seront upserts dès que la session est active
      if(isSignup&&profileData){
        try{localStorage.setItem("studia_pending_profile_"+email,JSON.stringify(profileData));}catch(e){}
      }
      if(isSignup&&!data.session){
        if(err){err.style.color="var(--accentDark)";err.textContent="✓ Compte créé. Vérifie ta boîte mail pour confirmer.";}
        return;
      }
      const isAdmin=isAdminEmail(email);state.user={email,role:isAdmin?"admin":"student"};state.adminAuthed=isAdmin;state.menu=false;showDbStatus(true);toast(isAdmin?"Connecté en admin":"Bienvenue !","ok");
      // Sauve immédiatement le profil si signup réussi avec session active
      if(isSignup&&data.session&&profileData)await saveProfile(profileData);
      if(isAdmin){state.view="admin";render();checkSubscription();loadProfile();return;}
      await loadProfile();await checkSubscription();
      // Restaure le pending profile si existe (cas confirm mail → premier login)
      try{const pending=localStorage.getItem("studia_pending_profile_"+email);if(pending&&!hasProfile()){const pd=JSON.parse(pending);await saveProfile(pd);localStorage.removeItem("studia_pending_profile_"+email);await loadProfile();}}catch(e){}
      state.view=hasProfile()?"mycourses":"univs";
      if(state.view==="mycourses")loadMyStats().then(s=>{state.myStats=s;render();});
      render();return;
    }catch(e){if(err)err.textContent=e.message;return;}
  }
  loginStudent(email);
}

/* ===== Progression temporelle (déblocage par calendrier universitaire) =====
   Règle : l'étudiant s'inscrit à un niveau (L1/L2/L3) + un semestre.
   - Le niveau suivant s'ouvre automatiquement en SEPTEMBRE (rentrée).
   - Le S1 est dispo dès la rentrée (septembre), le S2 s'ouvre vers JANVIER.
   - Les années DÉJÀ passées restent accessibles ; les années futures sont verrouillées.
   - Les admins ne sont jamais limités. */
const LEVELS=["L1","L2","L3"];
const UNLOCK={ september:8 /*mois 0-indexé : 8=septembre*/, january:0 };
// Année calendaire du septembre qui ouvre l'année universitaire contenant la date d.
function academicYearStartYear(d){const m=d.getMonth();return m>=UNLOCK.september?d.getFullYear():d.getFullYear()-1;}
const MONTHS_FR=["janvier","février","mars","avril","mai","juin","juillet","août","septembre","octobre","novembre","décembre"];
// Calcule l'accès courant d'un étudiant à partir de son profil (et d'une date, mockable pour les tests).
function studentAccess(profile,now){
  now=now||new Date();
  profile=profile||{};
  const baseIdx=Math.max(0,LEVELS.indexOf(profile.annee||"L1"));
  const enrolled=profile.created_at?new Date(profile.created_at):now;
  const baseAY=academicYearStartYear(enrolled);
  const curAY=academicYearStartYear(now);
  let yearsElapsed=curAY-baseAY; if(yearsElapsed<0)yearsElapsed=0;
  let curIdx=baseIdx+yearsElapsed; if(curIdx>LEVELS.length-1)curIdx=LEVELS.length-1;
  const m=now.getMonth();
  // Dans l'année univ courante : sept→déc = S1 seul ; janv→août = S2 ouvert.
  const s2Unlocked = (m>=UNLOCK.january && m<UNLOCK.september);
  const curSem = s2Unlocked ? "S2" : "S1";
  function allowed(annee,sem){
    const ai=LEVELS.indexOf(annee);
    if(ai<0)return true;            // type inconnu (Master, etc.) → on ne bloque pas
    if(ai!==curIdx)return false;    // STRICT : seule l'année EN COURS est accessible (ni avant, ni après)
    if((sem||"S1")==="S2")return s2Unlocked; // année courante : S2 selon le calendrier
    return true;
  }
  // Date lisible de la prochaine ouverture (pour message UI).
  function nextUnlock(annee,sem){
    const ai=LEVELS.indexOf(annee);
    if(ai===curIdx && (sem||"S1")==="S2" && !s2Unlocked){
      return `janvier ${curAY+1}`; // S2 de l'année en cours ouvre en janvier prochain
    }
    if(ai>curIdx){
      const yearsToWait=ai-curIdx;
      return `septembre ${curAY+yearsToWait}`;
    }
    return null; // année passée : pas de date (n'est plus dans le cursus courant)
  }
  // Message lisible expliquant POURQUOI un niveau est verrouillé.
  function lockReason(annee,sem){
    const ai=LEVELS.indexOf(annee);
    if(ai<0||allowed(annee,sem))return "";
    if(ai<curIdx)return `Tu es en ${LEVELS[curIdx]} — le ${annee} n'est plus dans ton année en cours.`;
    if(ai>curIdx){const nu=nextUnlock(annee,sem);return nu?`${annee} s'ouvrira en ${nu}.`:`${annee} n'est pas encore accessible.`;}
    // même année, S2 pas encore ouvert
    const nu=nextUnlock(annee,sem);
    return nu?`Le semestre 2 s'ouvrira en ${nu}.`:`${sem||"S2"} n'est pas encore accessible.`;
  }
  return {levelIdx:curIdx, level:LEVELS[curIdx], semester:curSem, s2Unlocked, allowed, nextUnlock, lockReason};
}

/* Carte de contenu (preview vidéo / icône type, badges, favori) */
function typeGradient(type){
  const map={
    Cours:"linear-gradient(135deg,#E7F8EC,#C6EDD3)",
    TD:"linear-gradient(135deg,#E9F0FE,#CBDDF9)",
    Midterm:"linear-gradient(135deg,#FBF1E0,#F2DEBC)",
    Examen:"linear-gradient(135deg,#F6E9F3,#E6C9DF)"
  };
  return map[type]||"linear-gradient(135deg,#F2F1EE,#E1E0DB)";
}
function contentCardHTML(it,opener,extraTag){
  opener=opener||"openItem";
  const locked=!it.gratuit&&!state.subscribed&&!isAdminUser();
  const bookmarked=state.bookmarks.has(it.id);
  const v=parseVideoEmbed(it.video_url,false);
  const thumb=v&&v.thumb;
  const grad=typeGradient(it.type);
  let cover;
  if(thumb){
    cover=`<div class="cc-cover" style="background:${grad}"><img src="${thumb}" alt="" loading="lazy" onerror="this.remove()">${locked?'<div class="cc-lock">🔒</div>':'<div class="cc-play">▶</div>'}</div>`;
  }else{
    const inner=locked?'<div class="cc-lock">🔒</div>':(v?'<div class="cc-play">▶</div>':`<span>${smartIcon(it)}</span>`);
    cover=`<div class="cc-cover" style="background:${grad}">${inner}</div>`;
  }
  const badges=[
    it.gratuit?'<span class="cc-pill free">Gratuit</span>':"",
    it.video_url?'<span class="cc-pill video">▶ Vidéo</span>':"",
    it.source==="upload"?'<span class="cc-pill new">Nouveau</span>':""
  ].filter(Boolean).join("");
  const sub=extraTag?esc(extraTag):esc(it.tuteur||"");
  const subOk=sub&&sub!=="—"&&sub!=="-";
  const noteStr=it.note!=null?String(it.note).trim():"";
  const noteOk=noteStr!==""&&noteStr!=="—"&&noteStr!=="-";
  const metaParts=[];
  if(subOk)metaParts.push(`★ ${sub}`);
  if(noteOk)metaParts.push(`${esc(noteStr)}/20`);
  if(it.duree)metaParts.push(esc(it.duree));
  return `<div class="content-card" onclick="${opener}('${it.id}')">
    ${cover}
    ${badges?`<div class="cc-badges">${badges}</div>`:""}
    <button class="cc-star ${bookmarked?"on":""}" onclick="event.stopPropagation();toggleBookmark('${it.id}')" title="${bookmarked?"Retirer des favoris":"Ajouter aux favoris"}">${bookmarked?"★":"☆"}</button>
    <div class="cc-body">
      <span class="cc-type">${esc(labelFor(it.type))}</span>
      <div class="cc-title">${esc(it.titre||"")}</div>
      ${metaParts.length?`<div class="cc-meta">${metaParts.join(" · ")}</div>`:""}
    </div>
  </div>`;
}

  const L122_4="https://www.legifrance.gouv.fr/codes/article_lc/LEGIARTI000006278911";

  return `<div class="legal-note">
    <div class="ln-h">⚖️ Propriété intellectuelle &amp; légalité</div>
    <p>Les sujets <b>officiels</b> des établissements (examens finaux, midterms, partiels, TD corrigés) sont protégés par le droit d'auteur : Studia <b>ne les reproduit pas et ne les rediffuse pas</b>. Les contenus proposés ici sont des <b>productions originales</b> rédigées par nos tuteurs, qui reprennent le <b>format, le niveau et les thématiques</b> des épreuves réelles — pour t'entraîner comme sur les vrais sujets, dans le strict respect de la loi.</p>
    <div class="ln-links">
      <a href="${L122_4}" target="_blank" rel="noopener noreferrer">Art. L122-4 CPI · reproduction</a>
      <a href="${L122_5}" target="_blank" rel="noopener noreferrer">Art. L122-5 CPI · exceptions &amp; citation</a>

function smallUserBadge(){
  if(!state.user)return "";
  const p=state.profile||{};
  const label=esc(((p.prenom||"")+" "+(p.nom||"")).trim()||state.user.email);

function MediaPlayer(it,unlocked){
  const v=parseVideoEmbed(it.video_url,true);
  const vC=parseVideoEmbed(it.video_corrige_url,true);
  const tab=state.mediaTab||"sujet";
  const isCours=it.type==="Cours";
  const hasCorrige=!!(it.corrige_path||vC);
  const tabsHTML=hasCorrige?`<div class="media-tabs"><button class="${tab==='sujet'?'on':''}" onclick="setMediaTab('sujet','${it.id}')">📄 ${isCours?'Cours':'Sujet'}</button><button class="${tab==='corrige'?'on':''}" onclick="setMediaTab('corrige','${it.id}')">✓ Corrigé</button></div>`:"";
  const useVideo=tab==="sujet"?v:vC;
  const usePdfPath=tab==="sujet"?it.file_path:it.corrige_path;
  const useUrl=tab==="sujet"?state._pdfUrl:state._corrUrl;
  const useStatus=tab==="sujet"?state._pdfStatus:state._corrStatus;
  const size=state.pdfSize||"normal";
  const sizeBar=usePdfPath?`<div class="media-toolbar"><span class="muted">Affichage</span><div class="size-controls">${[["compact","Compact"],["normal","Normal"],["large","Grand"]].map(([k,l])=>`<button class="${size===k?"on":""}" onclick="state.pdfSize='${k}';render()">${l}</button>`).join("")}</div><button class="btn btn-ghost btn-sm" style="margin-left:8px" onclick="openFullscreenPDF()" title="Plein écran">⛶ Plein écran</button></div>`:"";
  if(!unlocked){
    const thumb=v&&v.thumb;
    return `${tabsHTML}<div class="player-wrap" style="background:#111;display:flex;align-items:center;justify-content:center;color:#fff;position:relative">${thumb?`<img src="${thumb}" style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover;filter:blur(10px) brightness(.4)"/>`:""}<div style="text-align:center;padding:24px;position:relative;z-index:1"><div style="font-size:32px;margin-bottom:10px">🔒</div><div style="margin-bottom:16px;font-size:15px">Contenu réservé aux abonnés</div><button class="btn btn-accent btn-lg" onclick="setModal(true)">S'abonner — 9 €/mois</button></div></div>`;
  }
  if(useVideo){
    const playerSrc=useVideo.kind==="file"?`<video src="${useVideo.embed}" controls autoplay muted></video>`:`<iframe src="${useVideo.embed}" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>`;
    return `${tabsHTML}<div class="player-wrap hidden-on-blur">${playerSrc}${smallUserBadge()}</div>`;
  }
  if(usePdfPath){
    if(useStatus==="loading")return `${tabsHTML}${sizeBar}<div class="pdf-wrap size-${size} hidden-on-blur"><div class="pdf-loading">📄 Préparation du document tatoué à ton compte…</div></div>`;
    if(useStatus==="error")return `${tabsHTML}${sizeBar}<div class="pdf-wrap size-${size}"><div class="pdf-loading" style="color:#B4453A">❌ Impossible de charger le fichier. Recharge la page.</div></div>`;
    if(useUrl)return `${tabsHTML}${sizeBar}<div class="pdf-wrap size-${size} hidden-on-blur no-screenshot"><iframe src="${useUrl}#toolbar=0&navpanes=0&scrollbar=0&statusbar=0&messages=0&view=FitH"></iframe>${smallUserBadge()}</div>`;
    return `${tabsHTML}${sizeBar}<div class="pdf-wrap size-${size}"><div class="pdf-loading">Chargement…</div></div>`;
  }
  return `${tabsHTML}<div class="player-wrap" style="background:#F2F1EE;display:flex;align-items:center;justify-content:center;color:var(--sub)"><div style="text-align:center;padding:24px">📄 Aucun média pour cette section</div></div>`;
}
function openFullscreenPDF(){
  const url=state.mediaTab==="corrige"?state._corrUrl:state._pdfUrl;
  if(!url){toast("PDF pas encore prêt","warn");return;}
  state.pdfFullscreen=true;render();
}
function closeFullscreenPDF(){state.pdfFullscreen=false;render();}
function renderFullscreenOverlay(){
  if(!state.pdfFullscreen||!state.item)return "";
  const url=state.mediaTab==="corrige"?state._corrUrl:state._pdfUrl;
  if(!url)return "";

  return `<div class="pdf-fullscreen-overlay" onkeydown="if(event.key==='Escape')closeFullscreenPDF()">
    <div class="pdf-fullscreen-bar">
      <div style="font-weight:600">${esc(state.item.titre||"")}</div>
      <div style="display:flex;align-items:center;gap:8px;font-size:12px;color:rgba(255,255,255,.7)">Studia · ${userLabel}</div>

    </div>

      <iframe src="${url}#toolbar=0&navpanes=0&view=FitH"></iframe>
      <div class="watermark-mosaic">${Array(12).fill(0).map(()=>`<span>Studia · ${userLabel}</span>`).join("")}</div>

}
function setMediaTab(tab,contenuId){
  state.mediaTab=tab;render();

  if(tab==="corrige"&&it.corrige_path&&!state._corrUrl&&state._corrStatus!=="loading")prepareCorrigeForView(it,it.corrige_path);

/* ===== Profile (Mon compte) ===== */
function fmtDuration(seconds){
  if(!seconds||seconds<60)return `${seconds||0} s`;
  const h=Math.floor(seconds/3600), m=Math.floor((seconds%3600)/60);
  if(h>0)return `${h}h ${m}m`;
  return `${m} min`;
}
function fmtRelativeDate(iso){
  if(!iso)return "—";
  const d=new Date(iso), now=new Date();
  const diff=Math.floor((now-d)/1000);
  if(diff<60)return "à l'instant";
  if(diff<3600)return `il y a ${Math.floor(diff/60)} min`;
  if(diff<86400)return `il y a ${Math.floor(diff/3600)}h`;
  if(diff<604800)return `il y a ${Math.floor(diff/86400)}j`;
  return d.toLocaleDateString("fr-FR");
}
function ageFromBirthdate(iso){if(!iso)return null;const b=new Date(iso);if(isNaN(b))return null;const n=new Date();let a=n.getFullYear()-b.getFullYear();const md=n.getMonth()-b.getMonth();if(md<0||(md===0&&n.getDate()<b.getDate()))a--;return a>=0&&a<130?a:null;}
function fmtBirthdate(iso){if(!iso)return "";const d=new Date(iso);if(isNaN(d))return iso;return d.toLocaleDateString("fr-FR");}
function profileInfoRow(label,value){if(!value)return "";return `<div style="display:flex;justify-content:space-between;gap:14px;padding:9px 0;border-bottom:1px solid var(--border)"><span class="muted">${label}</span><span style="text-align:right;color:var(--text)">${value}</span></div>`;}
function profileDocRow(kind,label,icon,path,nom){
  const ext=path?(String(path).match(/\.[^.]+$/)||[""])[0]:"";
  const fname=(label.replace(/[^\wÀ-ÿ]+/g,"_")+"_"+(nom||"etudiant")+ext);
  return `<div style="display:flex;align-items:center;justify-content:space-between;gap:12px;padding:14px 0;border-bottom:1px solid var(--border)">
    <div style="display:flex;align-items:center;gap:12px;min-width:0">
      <div class="ic">${icon}</div>
      <div style="min-width:0"><div style="font-weight:500;color:var(--ink);font-size:14.5px">${label}</div>
      <div class="muted" style="font-size:12.5px">${path?"✓ Document déposé":"Aucun fichier — optionnel"}</div></div>
    </div>
    <div style="display:flex;gap:6px;flex-wrap:wrap;justify-content:flex-end">
      ${path?`<button class="btn btn-ghost btn-sm" onclick="openDoc('${esc(String(path))}','${esc(fname)}')">Voir</button>`:""}
      <label class="btn btn-ghost btn-sm" style="cursor:pointer;margin:0">${path?"Remplacer":"Déposer"}<input type="file" accept=".pdf,.png,.jpg,.jpeg,.doc,.docx,image/*,application/pdf" style="display:none" onchange="uploadDoc(this.files[0],'${kind}')"/></label>
      ${path?`<button class="btn btn-ghost btn-sm" style="color:#B4453A" onclick="deleteDoc('${kind}')">Suppr.</button>`:""}
    </div>
  </div>`;
}

}
// Correspondance id du DOM → clé du profil
const PROFILE_FIELD_MAP={pPrenom:"prenom",pNom:"nom",pBirth:"birthdate",pGenre:"genre",pPhone:"phone",pVille:"ville",pAdresse:"adresse",pLinkedin:"linkedin",pBio:"bio",pUniv:"univ",pFaculte:"faculte",pAnnee:"annee",pSemestre:"semestre"};
function captureProfile(){
  const g=id=>{const e=document.getElementById(id);return e?e.value:undefined;};
  const next={...(state._profForm||{})};
  Object.keys(PROFILE_FIELD_MAP).forEach(id=>{const val=g(id);if(val!==undefined)next[PROFILE_FIELD_MAP[id]]=val;});
  state._profForm=next;
}
async function submitProfile(){
  const get=id=>{const e=document.getElementById(id);return e?(e.value||"").trim():undefined;};
  const fields={};
  // Ne sauvegarde QUE les champs réellement présents dans le DOM (les champs cursus verrouillés
  // n'existent pas → ils ne sont pas écrasés). Chaîne vide → null (sauf prénom/nom).
  Object.keys(PROFILE_FIELD_MAP).forEach(id=>{
    const val=get(id);if(val===undefined)return;
    const key=PROFILE_FIELD_MAP[id];
    fields[key]=(val===""&&key!=="prenom"&&key!=="nom")?null:val;
  });
  if(Object.keys(fields).length===0){state.editProfile=false;state._profForm=null;render();return;}
  const r=await saveProfile(fields);
  if(r.ok){state.editProfile=false;state._profForm=null;render();}
}
async function changePassword(){
  const newPass=prompt("Nouveau mot de passe (6+ caractères) :");
  if(!newPass||newPass.length<6){alert("Mot de passe trop court.");return;}
  if(!sb){alert("Pas de connexion.");return;}
  try{const{error}=await sb.auth.updateUser({password:newPass});if(error){toast(error.message,"err");return;}toast("✓ Mot de passe changé","ok");}catch(e){toast("Erreur","err");}
}

function aSet(k,v){state.a[k]=v;render();}
function aGo(view){state.a.view=view;render();}
function aPickUniv(id){const u=univById(id);if(!u||!u.actif)return;state.a.univ=u;state.a.view="fac";render();}

function aPickMat(idx){const m=matieresFor(state.a.univ.id,state.a.fac.id,state.a.niv,state.semestre||"S1")[idx];if(m==null)return;state.a.mat=m;const cats=catsFor(state.a.univ.id,state.a.fac.id,state.a.niv,m);state.a.tab=(cats[0]||{}).id||null;state.a.view="manage";render();}
function promptAddMatiere(){
  const sem=state.semestre||"S1";
  const nom=prompt(`Nom de la nouvelle matière (${sem}) :`);
  if(nom&&nom.trim()){
    const name=nom.trim(), uid=state.a.univ.id, fid=state.a.fac.id, niv=state.a.niv, f=facById(uid,fid);
    if(f){
      if(!f.mat[niv])f.mat[niv]=[];
      if(!f.mat[niv].includes(name))f.mat[niv].push(name);
      if(!state.matSem)state.matSem={};
      const key=matSemKey(uid,fid,niv,name);
      state.matSem[key]=sem;
      // Si la matière avait été supprimée (masquée), on la ré-affiche
      if(state.hiddenMatieres.has(key)){state.hiddenMatieres.delete(key);dbUnhideMatiere(uid,fid,niv,name);}
      render();
      // Persistance en base → la matière survit au rechargement même sans contenu
      dbAddMatiere(uid,fid,niv,name,sem).then(ok=>{if(ok)toast("Matière enregistrée","ok");});
    }
  }
}
async function deleteMatiere(nom){
  const a=state.a;
  const items=state.contenus.filter(c=>c.univ===a.univ.id&&c.faculte===a.fac.id&&c.annee===a.niv&&c.matiere===nom);
  const msg=items.length?`Supprimer « ${nom} » et ses ${items.length} contenu${items.length>1?"s":""} ? Action définitive.`:`Supprimer « ${nom} » ? Action définitive.`;
  if(!confirm(msg))return;
  // Supprime tous les contenus de cette matière en DB + storage
  for(const c of items){
    if(c.source!=="seed")await dbDeleteContenu(c.id,c.file_path);
  }
  state.contenus=state.contenus.filter(c=>!(c.univ===a.univ.id&&c.faculte===a.fac.id&&c.annee===a.niv&&c.matiere===nom));
  // Masque la matière en base
  const ok=await dbHideMatiere(a.univ.id,a.fac.id,a.niv,nom);
  if(ok)state.hiddenMatieres.add(`${a.univ.id}|${a.fac.id}|${a.niv}|${nom}`);
  // Enlève aussi de la liste hardcodée (en mémoire)
  const f=facById(a.univ.id,a.fac.id);
  if(f&&f.mat[a.niv])f.mat[a.niv]=f.mat[a.niv].filter(x=>x!==nom);
  if(state.matSem)delete state.matSem[matSemKey(a.univ.id,a.fac.id,a.niv,nom)];
  dbDeleteCustomMatiere(a.univ.id,a.fac.id,a.niv,nom);
  render();
}

async function updateApplication(id,status){
  if(!sb)return;

async function loadAdminStats(){
  if(!sb)return;
  state._statsLoading=true;render();
  try{
    const adminEmailsArr=[...ADMIN_EMAILS];
    // Nombre total d'inscrits (excluant admins)
    const{data:profs}=await sb.from("profiles").select("user_id,prenom,nom,univ,faculte,annee,created_at");
    // Top viewers (excluant admins)
    const{data:viewsAll}=await sb.from("views").select("user_id,duration_seconds,contenu_id,updated_at");
    // Map profile user_id → infos
    const profMap={};(profs||[]).forEach(p=>{profMap[p.user_id]=p;});
    // Calcule aggregations
    const userStats={};(viewsAll||[]).forEach(v=>{const k=v.user_id;if(!userStats[k])userStats[k]={user_id:k,views:0,seconds:0,lastSeen:null};userStats[k].views++;userStats[k].seconds+=v.duration_seconds||0;if(!userStats[k].lastSeen||v.updated_at>userStats[k].lastSeen)userStats[k].lastSeen=v.updated_at;});
    // Contenus les + vus
    const cStats={};(viewsAll||[]).forEach(v=>{cStats[v.contenu_id]=(cStats[v.contenu_id]||0)+1;});
    const topContenus=Object.entries(cStats).sort((a,b)=>b[1]-a[1]).slice(0,10).map(([id,n])=>{const c=state.contenus.find(x=>x.id===id);return{c,n};}).filter(x=>x.c);
    // Top users (exclu admins)
    const topUsers=Object.values(userStats).map(u=>({...u,profile:profMap[u.user_id]||null})).filter(u=>{const p=u.profile;return p&&!adminEmailsArr.some(e=>e.toLowerCase()===(p.email||"").toLowerCase());}).sort((a,b)=>b.seconds-a.seconds).slice(0,10);
    // Compte les inscrits non-admin
    const totalUsers=(profs||[]).length;
    state._stats={
      totalUsers,
      totalViews:(viewsAll||[]).length,
      totalHours:Math.round((viewsAll||[]).reduce((s,v)=>s+(v.duration_seconds||0),0)/3600),
      topUsers,topContenus,
      loadedAt:Date.now()
    };
    state._statsLoading=false;render();
  }catch(e){console.warn(e);state._statsLoading=false;render();}
}

const _catUpdTimers={};
function updCategory(sc,id,k,v){
  const s=_parseScope(sc);
  const c=(state.categories||[]).find(x=>x.univ===s.univ&&x.faculte===s.faculte&&x.annee===s.annee&&x.matiere===s.matiere&&x.id===id);
  if(!c)return;c[k]=v;
  const key=sc+"|"+id+"|"+k;
  if(_catUpdTimers[key])clearTimeout(_catUpdTimers[key]);
  _catUpdTimers[key]=setTimeout(()=>{dbUpsertCategory(c);},600);
}
async function deleteCategoryConfirm(sc,id){
  const s=_parseScope(sc);

/* ===== QR + watermark ===== */
function genId(){return Math.random().toString(36).slice(2,8);}
function today(){return new Date().toISOString().slice(0,10);}
function fileToDataURL(f){return new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result);r.onerror=rej;r.readAsDataURL(f);});}
function loadImage(s){return new Promise((res,rej)=>{const i=new Image();i.onload=()=>res(i);i.onerror=rej;i.src=s;});}
function makeQR(text,size){return new Promise(res=>{const h=document.createElement("div");document.getElementById("qrfactory").appendChild(h);new QRCode(h,{text,width:size,height:size,correctLevel:QRCode.CorrectLevel.M});setTimeout(()=>{const cv=h.querySelector("canvas");const u=cv?cv.toDataURL("image/png"):h.querySelector("img").src;h.remove();res(u);},40);});}
function placeOnCanvas(ctx,W,H,qr,o){
  const min=Math.min(W,H), s=Math.max(24,Math.round(min*o.sizePct/100)), pad=Math.round(min*.02);
  if(o.mode==="mosaique"){const gap=s*1.7;ctx.globalAlpha=o.opacity;for(let y=pad;y<H;y+=gap)for(let x=pad;x<W;x+=gap)ctx.drawImage(qr,x,y,s,s);ctx.globalAlpha=1;}
  else if(o.mode==="bandeau"){const n=Math.max(1,Math.floor(W/(s*1.6)));ctx.globalAlpha=Math.min(1,o.opacity+.08);ctx.fillStyle="#fff";ctx.fillRect(0,H-s-pad*2,W,s+pad*2);ctx.globalAlpha=o.opacity;for(let i=0;i<n;i++){const x=(i+.5)*(W/n)-s/2;ctx.drawImage(qr,x,H-s-pad,s,s);}ctx.globalAlpha=1;}
  else{let x=pad,y=pad;if(o.corner.includes("right"))x=W-s-pad;if(o.corner.includes("bottom"))y=H-s-pad;ctx.globalAlpha=Math.min(1,o.opacity+.15);ctx.fillStyle="#fff";ctx.fillRect(x-2,y-2,s+4,s+4);ctx.globalAlpha=o.opacity;ctx.drawImage(qr,x,y,s,s);ctx.globalAlpha=1;}
}
async function watermarkImage(file,token){
  const img=await loadImage(await fileToDataURL(file));
  const cv=document.createElement("canvas");cv.width=img.naturalWidth;cv.height=img.naturalHeight;
  const ctx=cv.getContext("2d");ctx.drawImage(img,0,0);
  const qr=await loadImage(await makeQR(token,160));
  placeOnCanvas(ctx,cv.width,cv.height,qr,state.opt);
  return cv.toDataURL("image/png");
}
async function watermarkPDF(file,token){
  const doc=await PDFLib.PDFDocument.load(await file.arrayBuffer(),{ignoreEncryption:true});
  const png=await doc.embedPng(await (await fetch(await makeQR(token,256))).arrayBuffer());
  const o=state.opt;
  doc.getPages().forEach(p=>{const{width:W,height:H}=p.getSize();const min=Math.min(W,H),s=Math.max(20,min*o.sizePct/100),pad=min*.03;
    if(o.mode==="mosaique"){const gap=s*1.7;for(let y=pad;y<H;y+=gap)for(let x=pad;x<W;x+=gap)p.drawImage(png,{x,y,width:s,height:s,opacity:o.opacity});}
    else if(o.mode==="bandeau"){const n=Math.max(1,Math.floor(W/(s*1.6)));for(let i=0;i<n;i++){const x=(i+.5)*(W/n)-s/2;p.drawImage(png,{x,y:pad,width:s,height:s,opacity:o.opacity});}}
    else{let x=pad,y=pad;if(o.corner.includes("right"))x=W-s-pad;if(o.corner.includes("top"))y=H-s-pad;p.drawImage(png,{x,y,width:s,height:s,opacity:o.opacity});}
  });
  return URL.createObjectURL(new Blob([await doc.save()],{type:"application/pdf"}));
}
async function processRecord(c){
  c.token=`STUDIA|${c.id}|c:${c.account}|${c.date}`;
  c.qr=await makeQR(c.token,160);
  try{if(c.kind==="image"){c.outUrl=await watermarkImage(c.file,c.token);c.outName=c.titre.replace(/\.[^.]+$/,"")+"_tatoue.png";c.thumb=c.outUrl;}
    else{c.outUrl=await watermarkPDF(c.file,c.token);c.outName=c.titre.replace(/\.[^.]+$/,"")+"_tatoue.pdf";}c.error=null;
  }catch(e){c.error="Échec : "+e.message;}
}
async function handleFiles(files){
  const a=state.a;
  if(!a.tab||!catsFor(a.univ.id,a.fac.id,a.niv,a.mat).find(c=>c.id===a.tab)){toast("Crée d'abord une rubrique pour cette matière","warn");return;}
  for(const file of files){
    const kind=file.type==="application/pdf"?"pdf":(file.type.startsWith("image/")?"image":null);if(!kind)continue;
    const c={id:genId(),source:"upload",kind,file,
      univ:a.univ.id,faculte:a.fac.id,annee:a.niv,matiere:a.mat,type:a.tab,
      semestre:state.semestre||"S1",
      account:ACCOUNT,email:(state.user&&state.user.email)||ADMIN_EMAIL,date:today(),ts:Date.now(),
      titre:file.name,tuteur:"—",note:"—",duree:"",gratuit:false,qr:null,outUrl:null,thumb:null,error:null,
      file_path:null,video_url:null,description:null};
    if(kind==="image")c.thumb=await fileToDataURL(file);
    state.contenus.push(c);render();
    await processRecord(c);
    // Upload original vers Storage + insert ligne en base
    const path=await dbUploadFile(file,c.id);
    if(path)c.file_path=path;
    const r=await dbInsertContenu(c);
    if(!r.ok&&!r.offline)c.error=(c.error||"")+" (DB: "+(r.error||"erreur")+")";
    render();
  }
}

var scanStream=null, scanRAF=null;
async function resolveToken(str){
  const out=document.getElementById("to"); if(!out)return;
  const v=(str||"").trim(); if(!v){out.innerHTML="";return;}
  out.innerHTML=`<div class="trace-result">🔍 Recherche en cours…</div>`;
  // 1) Cherche dans la table downloads (vrai téléchargement abonné)
  if(sb){
    try{
      const{data}=await sb.from("downloads").select("*,contenus(*)").eq("token",v).maybeSingle();
      if(data){
        const c=data.contenus||{};
        const u=univById(c.univ),fac=facById(c.univ,c.faculte);
        // récupère l'email du user qui a téléchargé
        let userEmail="(inconnu)";
        try{const{data:p}=await sb.from("profiles").select("prenom,nom").eq("user_id",data.user_id).maybeSingle();if(p)userEmail=`${p.prenom||""} ${p.nom||""}`.trim()||"(profil incomplet)";}catch(e){}
        const rows=[["⚠ FUITE TRACÉE","abonné identifié"],["User ID",`<span class="token">${data.user_id}</span>`],["Nom",esc(userEmail)],["Sujet",esc(c.titre||"—")],["Emplacement",`${u?u.ville:""} ▸ ${fac?fac.nom:c.faculte||""} ▸ ${c.annee||""} ▸ ${c.matiere||""} ▸ ${labelFor(c.type)||""}`],["Téléchargé le",new Date(data.downloaded_at).toLocaleString("fr-FR")]];
        out.innerHTML=`<div class="trace-result"><b style="color:#B4453A">🚨 Fuite tracée à un abonné</b><div style="margin-top:8px;display:grid;grid-template-columns:auto 1fr;gap:5px 12px;font-size:13px">${rows.map(([k,val])=>`<span style="color:var(--sub)">${k}</span><span>${val}</span>`).join("")}</div></div>`;
        return;
      }
    }catch(e){console.warn(e);}
  }
  // 2) Fallback : essaye d'extraire l'email du token (format STUDIA|contenuId|u:email|date|rand)
  const partsMatch=v.match(/STUDIA\|([a-z0-9]+)\|u:([^|]+)\|([0-9-]+)\|?/i);
  if(partsMatch){
    const[,id,email,date]=partsMatch;
    const c=state.contenus.find(x=>x.id===id);
    const u=c?univById(c.univ):null,fac=c?facById(c.univ,c.faculte):null;
    const rows=[["📧 Email viewer",esc(email)],["📅 Date d'ouverture",date],["📄 Sujet",c?esc(c.titre||"—"):"(contenu supprimé)"],["📍 Emplacement",c?`${u?u.ville:""} ▸ ${fac?fac.nom:c.faculte||""} ▸ ${c.annee||""} ▸ ${c.matiere||""} ▸ ${labelFor(c.type)}`:"—"],["🆔 Token",`<span class="token">${esc(v)}</span>`]];
    out.innerHTML=`<div class="trace-result"><b style="color:#B4453A">🚨 Fuite tracée (parsing token)</b><p class="muted" style="margin:6px 0 8px;font-size:11.5px">Cette ouverture n'a pas été enregistrée en base (utilisateur déconnecté ou erreur réseau), mais le token contient l'email.</p><div style="margin-top:8px;display:grid;grid-template-columns:auto 1fr;gap:5px 12px;font-size:13px">${rows.map(([k,val])=>`<span style="color:var(--sub)">${k}</span><span>${val}</span>`).join("")}</div></div>`;
    return;
  }
  // 3) Fallback ultime : juste un contenu_id sans user info
  const m=v.match(/STUDIA\|([a-z0-9]+)/i)||v.match(/^([a-z0-9]{6})$/i);
  if(m){
    const id=m[1];const c=state.contenus.find(x=>x.id===id);
    if(c){
      const u=univById(c.univ),fac=facById(c.univ,c.faculte);
      out.innerHTML=`<div class="trace-result miss"><b>QR sans info utilisateur</b><p style="margin:6px 0 0;font-size:13px">Ce QR pointe vers <b>${esc(c.titre||"")}</b> (${u?u.ville:""} ▸ ${fac?fac.nom:""} ▸ ${c.matiere||""}) mais ne contient pas l'email du téléchargeur. C'est probablement un QR généré côté admin (preview), pas un téléchargement abonné.</p></div>`;
      return;
    }
  }
  out.innerHTML=`<div class="trace-result miss">Code lu : ${esc(v)} — token non reconnu.</div>`;
}
function traceText(){resolveToken(document.getElementById("ti").value);}
async function traceImage(input){
  const f=input.files[0]; if(!f)return; input.value="";
  if(typeof jsQR==="undefined"){document.getElementById("to").innerHTML='<div class="trace-result miss">Lecteur QR non chargé (réseau).</div>';return;}
  try{const img=await loadImage(await fileToDataURL(f));const cv=document.createElement("canvas");cv.width=img.naturalWidth;cv.height=img.naturalHeight;const ctx=cv.getContext("2d");ctx.drawImage(img,0,0);const d=ctx.getImageData(0,0,cv.width,cv.height);const code=jsQR(d.data,cv.width,cv.height);if(code)resolveToken(code.data);else document.getElementById("to").innerHTML='<div class="trace-result miss">Aucun QR détecté sur cette image.</div>';}
  catch(e){document.getElementById("to").innerHTML='<div class="trace-result miss">Erreur de lecture : '+e.message+'</div>';}
}
async function startScan(){
  const v=document.getElementById("scanVid");
  if(typeof jsQR==="undefined"){document.getElementById("to").innerHTML='<div class="trace-result miss">Lecteur QR non chargé (réseau).</div>';return;}
  try{
    scanStream=await navigator.mediaDevices.getUserMedia({video:{facingMode:"environment"}});
    v.srcObject=scanStream;await v.play();
    document.getElementById("scanWrap").style.display="block";
    document.getElementById("scanStart").style.display="none";
    document.getElementById("scanStop").style.display="inline-flex";
    scanTick();
  }catch(e){document.getElementById("to").innerHTML='<div class="trace-result miss">Caméra indisponible ('+e.message+'). Utilise « Importer une image ».</div>';}
}
function scanTick(){
  const v=document.getElementById("scanVid");
  if(!v||!scanStream)return;
  if(v.readyState>=2&&v.videoWidth){
    const cv=document.createElement("canvas");cv.width=v.videoWidth;cv.height=v.videoHeight;
    const ctx=cv.getContext("2d");ctx.drawImage(v,0,0,cv.width,cv.height);
    const d=ctx.getImageData(0,0,cv.width,cv.height);
    const code=jsQR(d.data,cv.width,cv.height);
    if(code){stopScan();resolveToken(code.data);return;}
  }
  scanRAF=requestAnimationFrame(scanTick);
}
function stopScan(){
  if(scanRAF)cancelAnimationFrame(scanRAF);scanRAF=null;
  if(scanStream){scanStream.getTracks().forEach(t=>t.stop());scanStream=null;}
  const w=document.getElementById("scanWrap");if(w)w.style.display="none";
  const s=document.getElementById("scanStart"),st=document.getElementById("scanStop");if(s)s.style.display="inline-flex";if(st)st.style.display="none";
}
