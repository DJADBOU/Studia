<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Studia</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js" onerror="this.onerror=null;var s=document.createElement('script');s.src='https://unpkg.com/jsqr@1.4.0/dist/jsQR.js';document.head.appendChild(s);"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--bg:#FBFBFA;--surface:#FFFFFF;--border:#EAE9E6;--borderStrong:#DEDDD9;--ink:#1A1A18;--text:#37352F;--sub:#6F6E69;--muted:#9B9A94;--accent:#34C759;--accentDark:#2A9D47;--accentSoft:#E7F8EC;--amber:#9A6A18;--amberSoft:#F6EFDF;--sans:'Geist',-apple-system,BlinkMacSystemFont,sans-serif;--serif:'Instrument Serif',Georgia,serif;--ease:cubic-bezier(.25,.1,.25,1);--ease-soft:cubic-bezier(.16,1,.3,1);--shadow-sm:0 1px 2px rgba(26,26,24,.04),0 4px 12px rgba(26,26,24,.05);--shadow-md:0 6px 16px rgba(26,26,24,.05),0 16px 40px rgba(26,26,24,.07);--shadow-lg:0 10px 28px rgba(26,26,24,.06),0 30px 72px rgba(26,26,24,.10)}
*{box-sizing:border-box}
html{-webkit-text-size-adjust:100%;text-size-adjust:100%}
body{margin:0;font-family:var(--sans);background:var(--bg);color:var(--text);line-height:1.6;letter-spacing:-.01em;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;text-rendering:optimizeLegibility}
button{font-family:var(--sans);cursor:pointer}
input,select,textarea{font-family:var(--sans)}
a{color:inherit;text-decoration:none}
.hidden{display:none!important}
.wrap{max-width:1100px;margin:0 auto;padding:0 24px}
.logo{width:28px;height:28px;border-radius:50%;background:radial-gradient(circle at 50% 30%,#5BD974 0%,#34C759 45%,#1E8C3C 100%);color:#fff;display:flex;align-items:center;justify-content:center;font-family:var(--sans);font-weight:700;font-size:16px;box-shadow:0 1px 3px rgba(30,140,60,.25);letter-spacing:-.5px}
.ulogo{width:38px;height:38px;border-radius:9px;background:#fff;border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-family:var(--serif);font-size:18px;flex-shrink:0;overflow:hidden;color:var(--ink)}
.ulogo img{max-width:80%;max-height:80%;object-fit:contain}
.ulogo.fallback{background:var(--ink);color:#fff;border:none}
.serif{font-family:var(--serif);font-weight:400;letter-spacing:-.3px}
.pill{font-size:11.5px;font-weight:500;padding:3px 9px;border-radius:6px;background:var(--accentSoft);color:var(--accentDark);white-space:nowrap}
.tag{font-size:11.5px;font-weight:500;padding:3px 9px;border-radius:6px;background:#F2F1EE;color:var(--sub);white-space:nowrap}
.tag.amber{background:var(--amberSoft);color:var(--amber)}
.btn{border:1px solid transparent;border-radius:10px;font-weight:500;font-size:14px;padding:10px 18px;display:inline-flex;align-items:center;gap:7px;justify-content:center;letter-spacing:-.01em;transition:transform .35s var(--ease),box-shadow .35s var(--ease),background .2s,border-color .2s,opacity .2s}
.btn:hover{opacity:.95;transform:translateY(-1px)}
.btn-ink:hover,.btn-accent:hover{box-shadow:var(--shadow-md)}
.btn-ghost:hover{border-color:var(--ink);opacity:1}
.btn:active{transform:translateY(0);transition:transform .08s}
.btn-ink{background:var(--ink);color:#fff}.btn-accent{background:var(--accent);color:#fff}
.btn-ghost{background:transparent;color:var(--text);border:1px solid var(--borderStrong)}
.btn-sm{padding:6px 12px;font-size:13px}
.btn-lg{padding:12px 22px;font-size:15px}
.input{width:100%;padding:10px 12px;border-radius:8px;border:1px solid var(--borderStrong);background:var(--bg);font-size:14px;color:var(--ink);outline:none}
.input:focus{border-color:var(--accent)}
/* iOS: éviter le zoom auto au focus d'un champ <16px (sinon la page reste zoomée/décentrée sur iPhone) */
@media(max-width:640px){.input,input,select,textarea{font-size:16px!important}}
.card{background:var(--surface);border:1px solid var(--border);border-radius:14px}
.card-h{transition:transform .4s var(--ease),box-shadow .4s var(--ease),border-color .3s var(--ease);cursor:pointer}
.card-h:hover{border-color:var(--borderStrong);transform:translateY(-4px);box-shadow:var(--shadow-lg)}
.card-h:active{transform:translateY(-1px);transition:transform .08s}
.muted{color:var(--muted);font-size:12px}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.fade{animation:fadeUp .45s ease both}
.nav{position:sticky;top:0;z-index:30;background:rgba(251,251,250,.72);backdrop-filter:blur(20px) saturate(1.7);-webkit-backdrop-filter:blur(20px) saturate(1.7);border-bottom:1px solid var(--border)}
.nav-in{height:60px;display:flex;align-items:center;justify-content:space-between;gap:10px}
.nav-links{display:flex;align-items:center;gap:4px}
.nav-links .link{background:none;border:none;font-size:14px;padding:7px 12px;border-radius:7px;color:var(--sub)}
.nav-links .link.on{color:var(--ink);font-weight:500}
@media(max-width:820px){.nav-links .link{display:none}}
.ctxbar{border-bottom:1px solid var(--border);background:var(--surface)}
.ctxbar-in{display:flex;align-items:center;gap:8px;padding:10px 0;font-size:13px;color:var(--sub);flex-wrap:wrap}
.crumb{cursor:pointer;padding:3px 9px;border-radius:6px;background:#F2F1EE;color:var(--sub)}
.crumb:hover{color:var(--ink)}
.seg{display:inline-flex;background:#F2F1EE;border-radius:10px;padding:4px;gap:2px;flex-wrap:wrap}
.seg button{border:none;background:transparent;font-size:14px;font-weight:500;padding:8px 18px;border-radius:8px;color:var(--sub)}
.seg button.on{background:var(--surface);color:var(--ink);box-shadow:0 1px 2px rgba(0,0,0,.06)}
.seg button.locked{color:var(--muted);opacity:.65;cursor:not-allowed}
.seg.sm button{font-size:12.5px;padding:6px 11px}
.tabs{display:flex;gap:4px;border-bottom:1px solid var(--border);margin-bottom:20px;flex-wrap:wrap}
.tabs button{background:none;border:none;font-size:14.5px;padding:10px 14px;display:flex;align-items:center;gap:7px;color:var(--sub);border-bottom:2px solid transparent;margin-bottom:-1px}
.tabs button.on{color:var(--ink);font-weight:600;border-bottom-color:var(--ink)}
.row{padding:16px;display:flex;align-items:center;gap:14px;margin-bottom:10px}
.ic{width:44px;height:44px;border-radius:9px;display:flex;align-items:center;justify-content:center;flex-shrink:0;background:var(--accentSoft);color:var(--accentDark);font-size:18px}
.ic.lock{background:#F2F1EE;color:var(--muted)}
.grid{display:grid;gap:14px}
.dz{border:1.5px dashed var(--borderStrong);border-radius:12px;padding:24px 16px;text-align:center;color:var(--sub);transition:all .15s;cursor:pointer}
.dz:hover,.dz.drag{border-color:var(--accent);background:var(--accentSoft)}
.dz strong{color:var(--ink)}
.ctrl{margin-top:14px}
.ctrl-row{display:flex;justify-content:space-between;font-size:13px;color:var(--sub);margin-bottom:6px}
.ctrl-row b{color:var(--ink);font-weight:500}
input[type=range]{width:100%;accent-color:var(--accent)}
.token{font-family:ui-monospace,Menlo,monospace;font-size:11.5px;color:var(--accentDark);background:var(--accentSoft);padding:3px 7px;border-radius:6px;word-break:break-all}
.thumb{width:70px;height:70px;border-radius:9px;border:1px solid var(--border);background:#F2F1EE;flex-shrink:0;display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:11px;overflow:hidden;cursor:pointer;position:relative;transition:transform .15s}
.thumb:hover{transform:scale(1.04)}
.thumb img{width:100%;height:100%;object-fit:cover}
.thumb .play{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.35);color:#fff;font-size:18px;opacity:0;transition:opacity .15s}
.thumb:hover .play{opacity:1}
.video-preview-modal{position:fixed;inset:0;z-index:1000;background:rgba(0,0,0,.85);display:flex;align-items:center;justify-content:center;padding:40px;animation:fadeUp .25s ease}
.video-preview-modal .box{width:100%;max-width:920px;aspect-ratio:16/9;background:#000;border-radius:14px;overflow:hidden;position:relative}
.video-preview-modal iframe{width:100%;height:100%;border:0}
.video-preview-modal .close{position:absolute;top:-44px;right:0;background:rgba(255,255,255,.1);border:none;color:#fff;width:36px;height:36px;border-radius:50%;cursor:pointer;font-size:16px}
.search-overlay{position:fixed;inset:0;z-index:200;background:rgba(26,26,24,.55);display:flex;align-items:flex-start;justify-content:center;padding:80px 20px 20px;animation:fadeUp .2s ease}
.search-modal{background:var(--surface);border:1px solid var(--border);border-radius:14px;max-width:580px;width:100%;max-height:70vh;display:flex;flex-direction:column;box-shadow:0 24px 64px rgba(0,0,0,.2)}
.search-results{flex:1;overflow-y:auto;padding:6px}
.search-item{display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:8px;cursor:pointer;transition:background .12s}
.search-item:hover{background:var(--bg)}
.bookmark-btn{background:none;border:none;cursor:pointer;font-size:18px;color:var(--muted);padding:4px 8px;transition:transform .15s,color .15s}
.bookmark-btn:hover{transform:scale(1.15)}
.bookmark-btn.on{color:#F5A623}
/* ===== Matières & contenus (redesign cartes) ===== */
.mat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(258px,1fr));gap:16px}
.matiere-card{position:relative;background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:20px 20px 18px 24px;overflow:hidden;cursor:pointer;transition:transform .4s var(--ease),box-shadow .4s var(--ease),border-color .3s var(--ease)}
.matiere-card::before{content:"";position:absolute;left:0;top:0;bottom:0;width:5px;background:linear-gradient(180deg,var(--accent),var(--accentDark));opacity:.9}
.matiere-card:hover{border-color:var(--borderStrong);transform:translateY(-4px);box-shadow:var(--shadow-lg)}
.matiere-card:active{transform:translateY(-1px);transition:transform .05s}
.matiere-card .mc-top{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:14px}
.matiere-card h3{font-size:16.5px;color:var(--ink);font-weight:600;margin:0;line-height:1.32}
.matiere-card .mc-total{flex-shrink:0;font-size:11.5px;font-weight:600;color:var(--accentDark);background:var(--accentSoft);padding:4px 10px;border-radius:20px;white-space:nowrap}
.matiere-card .mc-chips{display:flex;gap:6px;flex-wrap:wrap}
.mc-chip{display:inline-flex;align-items:center;gap:5px;font-size:12px;color:var(--sub);background:var(--bg);border:1px solid var(--border);padding:4px 9px;border-radius:8px}
.mc-chip.zero{opacity:.42}
.mc-chip b{font-weight:600;color:var(--text)}
.content-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(248px,1fr));gap:16px}
.content-card{position:relative;display:flex;flex-direction:column;background:var(--surface);border:1px solid var(--border);border-radius:14px;overflow:hidden;cursor:pointer;transition:transform .4s var(--ease),box-shadow .4s var(--ease),border-color .3s var(--ease)}
.content-card:hover{border-color:var(--borderStrong);transform:translateY(-4px);box-shadow:var(--shadow-lg)}
.content-card:active{transform:translateY(-1px);transition:transform .05s}
.cc-cover{position:relative;height:126px;display:flex;align-items:center;justify-content:center;font-size:38px;overflow:hidden}
.cc-cover img{width:100%;height:100%;object-fit:cover;display:block}
.cc-play{position:absolute;width:46px;height:46px;border-radius:50%;background:rgba(20,20,18,.55);color:#fff;display:flex;align-items:center;justify-content:center;font-size:17px;padding-left:3px}
.cc-lock{position:absolute;inset:0;background:rgba(26,26,24,.32);display:flex;align-items:center;justify-content:center;font-size:25px}
.cc-badges{position:absolute;top:10px;left:10px;display:flex;gap:6px;flex-wrap:wrap;max-width:calc(100% - 54px);z-index:1}
.cc-star{position:absolute;top:8px;right:8px;background:rgba(255,255,255,.94);border:none;width:32px;height:32px;border-radius:50%;cursor:pointer;font-size:15px;color:var(--muted);display:flex;align-items:center;justify-content:center;box-shadow:0 2px 7px rgba(0,0,0,.14);transition:transform .15s,color .15s;z-index:2}
.cc-star:hover{transform:scale(1.12)}
.cc-star.on{color:#F5A623}
.cc-body{padding:13px 14px 14px;display:flex;flex-direction:column;gap:6px;flex:1}
.cc-type{font-size:10.5px;font-weight:700;letter-spacing:.03em;text-transform:uppercase;color:var(--accentDark)}
.cc-title{font-size:14.5px;color:var(--ink);font-weight:600;line-height:1.35;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.cc-meta{font-size:12.5px;color:var(--sub);margin-top:auto;padding-top:2px;line-height:1.4}
.cc-pill{font-size:10.5px;font-weight:600;padding:3px 8px;border-radius:6px;white-space:nowrap;box-shadow:0 1px 3px rgba(0,0,0,.08)}
.cc-pill.free{background:var(--accentSoft);color:var(--accentDark)}
.cc-pill.video{background:rgba(20,20,18,.66);color:#fff}
.cc-pill.new{background:var(--amberSoft);color:var(--amber)}
.legal-note{margin-top:34px;background:#FBFBFA;border:1px solid var(--border);border-left:3px solid var(--borderStrong);border-radius:12px;padding:16px 18px}
.legal-note .ln-h{display:flex;align-items:center;gap:8px;font-size:13px;font-weight:600;color:var(--text);margin-bottom:7px}
.legal-note p{margin:0;font-size:12.8px;line-height:1.62;color:var(--sub)}
.legal-note .ln-links{margin-top:11px;display:flex;gap:8px;flex-wrap:wrap;font-size:12px}
.legal-note .ln-links a{color:var(--accentDark);text-decoration:none;border:1px solid var(--border);background:var(--surface);padding:4px 10px;border-radius:7px;transition:border-color .15s,background .15s;white-space:nowrap}
.legal-note .ln-links a:hover{border-color:var(--accent);background:var(--accentSoft)}
@media(max-width:560px){.content-grid{grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px}.cc-cover{height:100px;font-size:30px}.cc-title{font-size:13.5px}.mat-grid{grid-template-columns:1fr}}
.notes-panel{margin-top:24px;background:#FBFBF5;border:1px solid #EAE6D4;border-radius:14px;padding:18px 20px}
.notes-panel textarea{width:100%;border:0;background:transparent;font-size:14.5px;font-family:inherit;line-height:1.5;outline:none;resize:vertical;min-height:80px;color:var(--text)}
.onboarding-overlay{position:fixed;inset:0;z-index:300;background:rgba(26,26,24,.6);display:flex;align-items:center;justify-content:center;padding:20px;animation:fadeUp .3s ease}
.onboarding-card{background:#fff;border-radius:18px;max-width:440px;padding:32px;text-align:center;position:relative}
.qrmini{width:46px;height:46px;border:1px solid var(--border);border-radius:7px;padding:3px;background:#fff;flex-shrink:0}
.qrmini img{width:100%;height:100%}
.note{display:flex;gap:10px;background:var(--amberSoft);border:1px solid #EADFC4;border-radius:12px;padding:14px;font-size:13px;color:#6B5418;line-height:1.55}
.trace-result{margin-top:12px;padding:13px;border-radius:10px;background:var(--accentSoft);font-size:13.5px;line-height:1.6}
.trace-result.miss{background:#FBEDEC;color:#8A3C34}
.modal-bg{position:fixed;inset:0;z-index:60;background:rgba(26,26,24,.45);display:flex;align-items:center;justify-content:center;padding:20px}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:16px;max-width:380px;width:100%;padding:28px}
.sec{padding:84px 0;border-top:1px solid var(--border)}
@media(max-width:640px){.sec{padding:54px 0}}
.photo{position:relative;overflow:hidden;background:linear-gradient(135deg,#34C759,#1E8C3C)}
.photo img{width:100%;height:100%;object-fit:cover;display:block}
.hero-img{position:absolute;inset:0;z-index:0;overflow:hidden}
.hero-img img{width:100%;height:100%;object-fit:cover}
.hero-img::after{content:"";position:absolute;inset:0;background:linear-gradient(180deg,rgba(251,251,250,.35),rgba(251,251,250,.9) 72%,var(--bg))}
.burger{display:none;background:none;border:1px solid var(--borderStrong);border-radius:8px;padding:7px 11px;font-size:16px}
@media(max-width:820px){.nav-links{display:none}.burger{display:inline-flex}}
.mobile-menu{border-top:1px solid var(--border)}
.mobile-menu .wrap>button{display:block;width:100%;text-align:left;background:none;border:none;padding:12px 0;font-size:15px;color:var(--text);border-bottom:1px solid var(--border)}
.auth-tab{flex:1;background:none;border:none;padding:10px;font-size:14px;font-weight:500;color:var(--sub);border-bottom:2px solid transparent;cursor:pointer}
.auth-tab.on{color:var(--ink);border-bottom-color:var(--ink)}
#qrfactory{position:fixed;left:-9999px;top:-9999px}
.toast-stack{position:fixed;bottom:20px;right:20px;z-index:200;display:flex;flex-direction:column;gap:8px;pointer-events:none;max-width:340px}
.toast{background:var(--ink);color:#fff;padding:10px 14px;border-radius:9px;font-size:13px;line-height:1.4;box-shadow:0 4px 16px rgba(0,0,0,.18);animation:toastIn .25s ease;display:flex;gap:8px;align-items:center}
.toast.ok{background:#1E8C3C}
.toast.err{background:#B4453A}
.toast.warn{background:#9A6A18}
.toast.fade-out{opacity:0;transform:translateY(8px);transition:all .3s ease}
@keyframes toastIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.dbstatus{position:fixed;bottom:20px;left:20px;z-index:50;background:var(--surface);border:1px solid var(--border);padding:6px 12px;border-radius:20px;font-size:12px;color:var(--sub);display:none;align-items:center;gap:6px;box-shadow:0 2px 8px rgba(0,0,0,.04)}
.dbstatus.show{display:flex}
.dbstatus.on{color:var(--accentDark);border-color:var(--accent)}
.dbstatus .dot{width:7px;height:7px;border-radius:50%;background:var(--muted)}
.dbstatus.on .dot{background:var(--accent);animation:pulse 2s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

/* ===== Nouvelles sections : stats, testimonials, founders ===== */
.reveal{opacity:0;transform:translateY(20px);transition:opacity .8s var(--ease),transform .8s var(--ease)}
.reveal.in{opacity:1;transform:translateY(0)}
@media (prefers-reduced-motion: reduce){*,*::before,*::after{animation-duration:.001ms!important;animation-iteration-count:1!important;transition-duration:.001ms!important;scroll-behavior:auto!important}.reveal{opacity:1!important;transform:none!important}}
.eyebrow{font-size:12px;font-weight:600;color:var(--accentDark);letter-spacing:1.2px;text-transform:uppercase;margin-bottom:14px;display:inline-block}

/* Stats band */
.stats-band{background:var(--ink);border-radius:20px;padding:38px 28px;position:relative;overflow:hidden}
.stats-band::before{content:"";position:absolute;inset:0;background:radial-gradient(circle at 90% 10%,rgba(52,199,89,.22),transparent 50%),radial-gradient(circle at 10% 110%,rgba(52,199,89,.14),transparent 50%);pointer-events:none}
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:24px;position:relative}
.stat{text-align:center;padding:8px 6px}
.stat-num{font-family:var(--serif);font-size:clamp(40px,5.5vw,60px);font-weight:400;color:#fff;line-height:1;letter-spacing:-1.5px;display:block}
.stat-suffix{font-family:var(--serif);color:var(--accent);font-size:.65em;margin-left:2px}
.stat-label{font-size:12.5px;color:rgba(255,255,255,.62);margin-top:10px;letter-spacing:.6px;text-transform:uppercase;font-weight:500}
@media(max-width:700px){.stats-grid{grid-template-columns:repeat(2,1fr);gap:18px}.stats-band{padding:28px 18px}}

/* Marquee testimonials */
.marquee{overflow:hidden;position:relative;padding:10px 0;mask-image:linear-gradient(90deg,transparent,#000 6%,#000 94%,transparent);-webkit-mask-image:linear-gradient(90deg,transparent,#000 6%,#000 94%,transparent)}
.marquee-track{display:flex;gap:18px;width:max-content;animation:marquee 70s linear infinite}
.marquee:hover .marquee-track{animation-play-state:paused}
@keyframes marquee{from{transform:translateX(0)}to{transform:translateX(-50%)}}
.testimonial{flex-shrink:0;width:340px;background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:22px;display:flex;flex-direction:column;gap:14px}
.testimonial-stars{color:#F5A623;font-size:14px;letter-spacing:1px}
.testimonial-quote{font-family:var(--serif);font-size:17px;line-height:1.5;color:var(--ink);margin:0;flex:1}
.testimonial-author{display:flex;align-items:center;gap:10px;margin-top:auto}
.testimonial-avatar{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,#34C759,#1E8C3C);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:600;font-size:13px;flex-shrink:0}
.testimonial-name{font-weight:600;color:var(--ink);font-size:13.5px;line-height:1.2}
.testimonial-meta{color:var(--sub);font-size:12px;margin-top:2px}

/* Founders */
.founders-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:22px}
.founder{position:relative;background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:32px;transition:all .35s cubic-bezier(.2,.7,.2,1);overflow:hidden;cursor:pointer}
.founder:hover{border-color:var(--borderStrong);transform:translateY(-5px);box-shadow:var(--shadow-lg)}
.founder-top{display:flex;gap:18px;align-items:center}
.founder-avatar{width:96px;height:96px;border-radius:50%;background:linear-gradient(135deg,#5BD974,#1E8C3C);color:#fff;display:flex;align-items:center;justify-content:center;font-family:var(--sans);font-weight:700;font-size:32px;letter-spacing:-1px;flex-shrink:0;box-shadow:0 8px 22px rgba(30,140,60,.32);overflow:hidden;position:relative}
.founder-avatar img{width:100%;height:100%;object-fit:cover;display:block;border-radius:50%}
.founder-id h3{font-family:var(--serif);font-size:24px;color:var(--ink);margin:0 0 4px;line-height:1.1}
.founder-role{font-size:13px;color:var(--accentDark);font-weight:600;letter-spacing:.3px;text-transform:uppercase}
.founder-bio{font-size:14.5px;color:var(--sub);line-height:1.6;max-height:0;overflow:hidden;transition:max-height .5s cubic-bezier(.2,.7,.2,1),opacity .3s ease,margin-top .3s ease;opacity:0;margin-top:0}
.founder:hover .founder-bio,.founder.open .founder-bio{max-height:380px;opacity:1;margin-top:18px}
.founder-tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:14px}
.founder-cta{display:flex;justify-content:space-between;align-items:center;margin-top:20px;padding-top:18px;border-top:1px solid var(--border)}
.founder-hint{font-size:12px;color:var(--muted);transition:opacity .25s ease}
.founder:hover .founder-hint,.founder.open .founder-hint{opacity:0}
.founder-linkedin{display:inline-flex;align-items:center;gap:6px;font-size:13px;color:var(--accentDark);font-weight:600;padding:6px 12px;border-radius:8px;background:var(--accentSoft);transition:all .15s}
.founder-linkedin:hover{background:var(--accent);color:#fff}
@media(max-width:700px){.founders-grid{grid-template-columns:1fr}}

/* Footer reload */
.footer-wrap{border-top:1px solid var(--border);margin-top:80px;background:var(--surface)}
.footer-grid{display:grid;grid-template-columns:1.6fr 1fr 1fr 1fr;gap:40px;padding:48px 0 24px}
.footer-brand{max-width:320px}
.footer-brand p{color:var(--sub);line-height:1.6;margin:14px 0 18px;font-size:13.5px}
.footer-col h4{font-size:12px;font-weight:600;color:var(--ink);margin:0 0 14px;letter-spacing:.8px;text-transform:uppercase}
.footer-col a{display:block;font-size:13.5px;color:var(--sub);padding:5px 0;transition:color .15s;cursor:pointer}
.footer-col a:hover{color:var(--ink)}
.social-row{display:flex;gap:10px}
.social{width:36px;height:36px;border-radius:50%;background:#F2F1EE;color:var(--sub);display:flex;align-items:center;justify-content:center;transition:all .25s cubic-bezier(.2,.7,.2,1)}
.social svg{width:16px;height:16px;fill:currentColor}
.social:hover{background:var(--accent);color:#fff;transform:translateY(-3px) scale(1.06);box-shadow:0 6px 16px rgba(52,199,89,.3)}
.footer-bottom{border-top:1px solid var(--border);padding:20px 0;display:flex;justify-content:space-between;flex-wrap:wrap;gap:10px;font-size:12px;color:var(--muted);line-height:1.6}
.footer-disclaimer{font-size:11.5px;color:var(--muted);background:var(--bg);padding:14px 18px;border-radius:10px;margin:0 0 20px;line-height:1.55;border:1px solid var(--border)}
@media(max-width:820px){.footer-grid{grid-template-columns:1fr 1fr;gap:32px}}
@media(max-width:520px){.footer-grid{grid-template-columns:1fr}}

/* Hero polish — glow accent */
.hero-glow{position:absolute;top:-200px;right:-150px;width:520px;height:520px;background:radial-gradient(circle,rgba(52,199,89,.22),transparent 70%);pointer-events:none;z-index:0}

/* Section title polish */
.sec-title{font-family:var(--serif);font-size:clamp(30px,3.8vw,44px);color:var(--ink);margin:0 0 12px;line-height:1.06;letter-spacing:-1px}
.sec-lead{font-size:16.5px;color:var(--sub);line-height:1.65;margin:0 0 34px;max-width:600px}

/* Détail contenu — players & commentaires */
.player-wrap{position:relative;border-radius:14px;overflow:hidden;background:#000;aspect-ratio:16/9}
.player-wrap iframe,.player-wrap video,.player-wrap embed{width:100%;height:100%;border:0;display:block}
.pdf-wrap{position:relative;border-radius:14px;overflow:hidden;background:#F4F3EE;border:1px solid var(--border);transition:height .3s ease}
.pdf-wrap iframe,.pdf-wrap embed{width:100%;height:100%;border:0;display:block}
.pdf-wrap.size-compact{height:60vh;min-height:380px}
.pdf-wrap.size-normal{height:82vh;min-height:520px}
.pdf-wrap.size-large{height:96vh;min-height:680px}
.pdf-loading{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:var(--sub);font-size:13px;background:var(--bg)}
.size-controls{display:inline-flex;background:#F2F1EE;border-radius:8px;padding:3px;gap:2px;margin-left:auto}
.size-controls button{border:none;background:transparent;font-size:12px;font-weight:500;padding:5px 10px;border-radius:6px;color:var(--sub);cursor:pointer}
.size-controls button.on{background:var(--surface);color:var(--ink);box-shadow:0 1px 2px rgba(0,0,0,.06)}
.media-toolbar{display:flex;align-items:center;gap:10px;margin-bottom:10px;font-size:12px;color:var(--sub)}
.user-watermark{position:absolute;bottom:8px;right:8px;z-index:3;font-size:11px;color:rgba(0,0,0,.4);background:rgba(255,255,255,.7);padding:3px 8px;border-radius:6px;pointer-events:none;font-weight:500;backdrop-filter:blur(4px)}
.watermark-mosaic{position:absolute;inset:0;pointer-events:none;z-index:2;display:grid;grid-template-columns:repeat(4,1fr);grid-template-rows:repeat(3,1fr);align-items:center;justify-items:center;opacity:.22;mix-blend-mode:multiply}
.watermark-mosaic span{color:#1a1a18;font-family:var(--sans);font-weight:700;font-size:14px;transform:rotate(-22deg);white-space:nowrap;text-shadow:0 0 1px #fff}
.pdf-fullscreen-overlay{position:fixed;inset:0;z-index:1000;background:#1a1a18;display:flex;flex-direction:column;animation:fadeUp .3s ease}
.pdf-fullscreen-bar{height:54px;background:#000;display:flex;align-items:center;justify-content:space-between;padding:0 16px;color:#fff;flex-shrink:0;border-bottom:1px solid rgba(255,255,255,.08)}
.pdf-fullscreen-body{flex:1;position:relative;overflow:hidden}
.pdf-fullscreen-body iframe{width:100%;height:100%;border:0}
.no-screenshot{user-select:none;-webkit-user-select:none}
.hidden-on-blur{transition:filter .15s ease}
body.hide-content .hidden-on-blur{filter:blur(28px) saturate(0)}
body.hide-content .hidden-on-blur::after{content:"⛔ Capture détectée — l'écran a été masqué";position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:#fff;background:rgba(0,0,0,.85);font-weight:600;font-size:14px;z-index:99}
.media-tabs{display:flex;gap:4px;border-bottom:1px solid var(--border);margin:24px 0 16px}
.media-tabs button{background:none;border:none;font-size:14px;padding:10px 16px;color:var(--sub);border-bottom:2px solid transparent;margin-bottom:-1px;cursor:pointer;display:flex;align-items:center;gap:8px}
.media-tabs button.on{color:var(--ink);font-weight:600;border-bottom-color:var(--accent)}
.comments{margin-top:36px;border-top:1px solid var(--border);padding-top:30px}
.comment{display:flex;gap:12px;padding:16px 0;border-bottom:1px solid var(--border)}
.comment:last-child{border-bottom:none}
.comment-avatar{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,#5BD974,#1E8C3C);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px;flex-shrink:0;overflow:hidden}
.comment-body{flex:1;min-width:0}
.comment-head{display:flex;justify-content:space-between;align-items:baseline;gap:8px;margin-bottom:4px}
.comment-name{font-weight:600;color:var(--ink);font-size:14px}
.comment-time{color:var(--muted);font-size:12px}
.comment-text{font-size:14.5px;color:var(--text);line-height:1.55;margin:0;white-space:pre-wrap}
.comment-form{display:flex;gap:10px;align-items:flex-start;padding:18px;border-radius:12px;background:#F8F8F5;border:1px solid var(--border);margin-bottom:18px}
.comment-form textarea{flex:1;border:none;background:transparent;font-size:14.5px;font-family:inherit;outline:none;resize:vertical;min-height:60px;color:var(--ink)}

/* Page placeholder (légal, contact) */
.page-content{max-width:760px;padding:60px 0}
.page-content h1{font-family:var(--serif);font-size:42px;color:var(--ink);margin:0 0 18px;line-height:1.1}
.page-content h2{font-family:var(--serif);font-size:22px;color:var(--ink);margin:32px 0 12px}
.page-content p{font-size:15px;color:var(--text);line-height:1.7;margin:0 0 14px}

/* ===== Landing v2 — refonte « nouvelle génération » ===== */
.lp-hero{position:relative;overflow:hidden;isolation:isolate}
.lp-hero-bg{position:absolute;inset:0;z-index:-1;background:radial-gradient(58% 48% at 50% -4%,rgba(52,199,89,.18),transparent 70%),radial-gradient(38% 40% at 86% 16%,rgba(91,217,116,.16),transparent 72%),radial-gradient(40% 48% at 10% 34%,rgba(42,157,71,.12),transparent 72%),var(--bg)}
.lp-hero-bg::before{content:"";position:absolute;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:48px 48px;opacity:.55;-webkit-mask-image:radial-gradient(72% 62% at 50% 26%,#000,transparent 76%);mask-image:radial-gradient(72% 62% at 50% 26%,#000,transparent 76%)}
.lp-hero-in{position:relative;text-align:center;max-width:800px;padding:60px 24px 72px}
.lp-badge{display:inline-flex;align-items:center;gap:10px;background:var(--surface);border:1px solid var(--border);border-radius:40px;padding:6px 16px 6px 7px;box-shadow:0 6px 22px rgba(26,26,24,.07);font-size:13px;color:var(--text);font-weight:500}
.lp-avs{display:flex}
.lp-avs span{width:26px;height:26px;border-radius:50%;border:2px solid var(--surface);margin-left:-9px;background:linear-gradient(135deg,#5BD974,#1E8C3C);color:#fff;font-size:9.5px;font-weight:700;display:flex;align-items:center;justify-content:center}
.lp-avs span:first-child{margin-left:0}
.lp-h1{font-family:var(--serif);font-size:clamp(44px,7.2vw,84px);line-height:.98;letter-spacing:-2px;color:var(--ink);margin:22px 0 18px;font-weight:400}
.lp-h1 i{font-style:italic;color:var(--accentDark)}
.lp-sub{font-size:clamp(16.5px,2.1vw,21px);line-height:1.5;color:var(--sub);margin:0 auto 28px;max-width:600px}
.lp-cta{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
.lp-trust{display:flex;gap:20px;justify-content:center;flex-wrap:wrap;margin-top:24px;font-size:12.5px;color:var(--muted);font-weight:500}
.lp-trust span{display:inline-flex;align-items:center;gap:5px}
.lp-float{position:absolute;z-index:1;background:var(--surface);border:1px solid var(--border);border-radius:15px;box-shadow:0 18px 42px rgba(26,26,24,.11);padding:11px 13px;display:flex;align-items:center;gap:10px;animation:lpFloat 6s ease-in-out infinite;transition:translate .3s cubic-bezier(.2,.7,.2,1),box-shadow .3s}
@keyframes lpFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-13px)}}
.lp-float .fa{width:38px;height:38px;border-radius:10px;background:linear-gradient(135deg,#5BD974,#1E8C3C);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:18px;flex-shrink:0}
.lp-float .ft{font-size:12.5px;color:var(--ink);font-weight:600;line-height:1.25;white-space:nowrap}
.lp-float .fm{font-size:11px;color:var(--sub)}
.lp-float .note{margin-left:4px;background:var(--accentSoft);color:var(--accentDark);font-weight:700;font-size:12px;padding:3px 8px;border-radius:7px;white-space:nowrap}
.lp-f1{top:13%;right:calc(50% + 420px);animation-delay:.2s}
.lp-f2{top:19%;left:calc(50% + 420px);animation-delay:1.4s}
.lp-f3{bottom:15%;right:calc(50% + 420px);animation-delay:.8s}
.lp-f4{bottom:20%;left:calc(50% + 420px);animation-delay:2s}
@media(max-width:1439px){.lp-float{display:none}}
.lp-norestart{animation:none!important}
.lp-norestart .lp-hero-in>*{animation:none!important}
.lp-logos{display:flex;align-items:center;justify-content:center;gap:30px;flex-wrap:wrap;padding:4px 0}
.lp-logos .ll{height:40px;display:flex;align-items:center;filter:grayscale(1);opacity:.5;transition:filter .25s,opacity .25s}
.lp-logos .ll:hover{filter:grayscale(0);opacity:1}
.lp-logos .ll img{max-height:36px;max-width:118px;object-fit:contain}
.offer-panel{display:none}
.offer-panel.on{display:block;animation:fadeUp .35s ease}
.offer-feat{display:flex;gap:12px;align-items:flex-start;padding:13px 0;border-bottom:1px solid var(--border)}
.offer-feat:last-child{border-bottom:none}
.offer-feat .ck{width:24px;height:24px;border-radius:50%;background:var(--accentSoft);color:var(--accentDark);display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0;font-weight:700}
.acc-item{border-bottom:1px solid var(--border)}
.acc-q{width:100%;display:flex;justify-content:space-between;align-items:center;gap:16px;background:none;border:none;padding:20px 2px;text-align:left;font-size:clamp(15px,2vw,17px);font-weight:600;color:var(--ink);transition:color .2s}
.acc-q:hover{color:var(--accentDark)}
.acc-ic{flex-shrink:0;width:30px;height:30px;border-radius:50%;background:var(--bg);border:1px solid var(--borderStrong);display:flex;align-items:center;justify-content:center;transition:transform .35s cubic-bezier(.2,.7,.2,1),background .2s,color .2s,border-color .2s;color:var(--sub);font-size:13px;line-height:1}
.acc-item.open .acc-ic{transform:rotate(180deg);background:var(--accent);color:#fff;border-color:var(--accent)}
.acc-a{display:grid;grid-template-rows:0fr;transition:grid-template-rows .38s cubic-bezier(.2,.7,.2,1)}
.acc-item.open .acc-a{grid-template-rows:1fr}
.acc-a-min{overflow:hidden}
.acc-a-min>div{padding:0 2px 22px;color:var(--sub);font-size:14.5px;line-height:1.65}
.faq-bubble{background:var(--accentSoft);border-radius:4px 14px 14px 14px;padding:14px 16px;color:var(--text);font-size:14.5px;line-height:1.6;display:flex;gap:10px;align-items:flex-start}
.faq-bubble .fb-av{width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,#5BD974,#1E8C3C);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px;flex-shrink:0}
.major-card{background:var(--surface);border:1px solid var(--border);border-radius:18px;padding:22px 18px;text-align:center;transition:transform .3s cubic-bezier(.2,.7,.2,1),box-shadow .3s,border-color .3s}
.major-card:hover{border-color:var(--accent);transform:translateY(-4px);box-shadow:0 16px 34px rgba(30,140,60,.12)}
.major-av{width:72px;height:72px;border-radius:50%;margin:0 auto 13px;background:linear-gradient(135deg,#5BD974,#1E8C3C);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:23px;letter-spacing:-1px}
.major-note{display:inline-flex;align-items:center;gap:4px;background:var(--accentSoft);color:var(--accentDark);font-weight:700;font-size:12.5px;padding:4px 11px;border-radius:20px;margin-top:9px}
.major-av img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.major-join{cursor:pointer;border-style:dashed;border-color:var(--borderStrong)}
.major-join:hover{border-color:var(--accent);transform:translateY(-4px);box-shadow:0 16px 34px rgba(30,140,60,.12)}
.major-av-join{background:var(--accentSoft);color:var(--accentDark);font-size:32px;font-weight:400;transition:transform .3s cubic-bezier(.2,.7,.2,1)}
.major-join:hover .major-av-join{transform:scale(1.07)}
.major-join .major-note{transition:transform .2s}
.major-join:hover .major-note{transform:translateX(3px)}
/* ----- couche d'animations « vivant » ----- */
#lp-progress{position:fixed;top:0;left:0;right:0;height:3px;transform-origin:0 50%;transform:scaleX(0);background:linear-gradient(90deg,var(--accent),#5BD974,var(--accentDark));z-index:300;transition:transform .12s linear;pointer-events:none}
.lp-hero-bg::before{animation:gridPan 26s linear infinite}
.lp-hero-bg::after{content:"";position:absolute;top:-10%;left:50%;width:min(560px,60vw);height:min(560px,60vw);border-radius:50%;background:radial-gradient(circle,rgba(52,199,89,.22),transparent 66%);filter:blur(34px);animation:auroraDrift 16s ease-in-out infinite;pointer-events:none}
@keyframes gridPan{from{background-position:0 0,0 0}to{background-position:48px 48px,48px 48px}}
@keyframes auroraDrift{0%,100%{transform:translate(-54%,0) scale(1)}50%{transform:translate(-46%,5%) scale(1.16)}}
.lp-hero-in>*{animation:heroIn .9s cubic-bezier(.2,.7,.2,1) both}
.lp-hero-in>*:nth-child(1){animation-delay:.04s}.lp-hero-in>*:nth-child(2){animation-delay:.12s}.lp-hero-in>*:nth-child(3){animation-delay:.2s}.lp-hero-in>*:nth-child(4){animation-delay:.28s}.lp-hero-in>*:nth-child(5){animation-delay:.36s}
@keyframes heroIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.lp-h1 i{background:linear-gradient(100deg,var(--accentDark),#5BD974,var(--accent),var(--accentDark));background-size:220% auto;-webkit-background-clip:text;background-clip:text;color:transparent;animation:shimmerText 6s linear infinite}
@keyframes shimmerText{to{background-position:220% center}}
.lp-float:hover{box-shadow:0 26px 56px rgba(26,26,24,.18)}
.lp-cta .btn{transition:transform .25s cubic-bezier(.2,.7,.2,1),box-shadow .25s,background .2s,color .2s,border-color .2s}
.lp-cta .btn:hover{transform:translateY(-2px)}
.lp-cta .btn-ink:hover,.lp-cta .btn-accent:hover{box-shadow:0 14px 30px rgba(26,26,24,.22)}
.lp-logos .ll:hover{transform:translateY(-3px) scale(1.04)}
.offer-panel .photo{overflow:hidden}
.offer-panel .photo img{transition:transform .6s cubic-bezier(.2,.7,.2,1)}
.offer-panel .photo:hover img{transform:scale(1.06)}
/* Comment ça marche — 3 étapes */
.lp-steps{position:relative;display:grid;grid-template-columns:repeat(3,1fr);gap:22px;max-width:920px;margin:8px auto 0}
.lp-steps::before{content:"";position:absolute;top:42px;left:15%;right:15%;height:2px;background:linear-gradient(90deg,transparent,var(--accentSoft) 14%,var(--accentSoft) 86%,transparent);z-index:0}
.lp-step{position:relative;z-index:1;text-align:center;padding:0 10px}
.lp-step-n{width:64px;height:64px;margin:0 auto 16px;display:flex;align-items:center;justify-content:center;font-family:var(--serif);font-size:30px;color:var(--accentDark);background:var(--surface);border:1.5px solid var(--accentSoft);border-radius:50%;box-shadow:0 6px 18px rgba(52,199,89,.12);transition:transform .3s cubic-bezier(.2,.7,.2,1),box-shadow .3s}
.lp-step:hover .lp-step-n{transform:translateY(-4px) scale(1.05);box-shadow:0 14px 30px rgba(52,199,89,.22)}
.lp-step-t{font-size:17px;font-weight:600;color:var(--ink);margin:0 0 6px}
.lp-step-d{font-size:14px;color:var(--sub);line-height:1.55;margin:0}
/* Tarifs — aperçu sur la landing */
.lp-prices{display:grid;grid-template-columns:repeat(3,1fr);gap:18px;max-width:920px;margin:0 auto;align-items:stretch}
.lp-price{position:relative;display:flex;flex-direction:column;background:var(--surface);border:1px solid var(--border);border-radius:18px;padding:26px 22px;transition:transform .3s cubic-bezier(.2,.7,.2,1),box-shadow .3s,border-color .3s}
.lp-price:hover{transform:translateY(-5px);box-shadow:0 20px 44px rgba(26,26,24,.10)}
.lp-price.reco{border:1.5px solid var(--accent);box-shadow:0 16px 40px rgba(52,199,89,.16)}
.lp-price.reco:hover{transform:translateY(-7px);box-shadow:0 26px 54px rgba(52,199,89,.22)}
.lp-price-pop{position:absolute;top:-13px;left:50%;transform:translateX(-50%);background:var(--accent);color:#fff;font-size:12px;font-weight:600;padding:5px 13px;border-radius:999px;white-space:nowrap;box-shadow:0 6px 16px rgba(52,199,89,.32)}
.lp-price-nom{font-size:15px;font-weight:600;color:var(--ink)}
.lp-price-amt{display:flex;align-items:baseline;gap:5px;margin:10px 0 2px}
.lp-price-amt b{font-family:var(--serif);font-size:46px;font-weight:400;color:var(--ink);line-height:1}

function toast(msg,kind="ok",dur=2800){

}

/* ===== Anti-flicker : ne jamais re-render pendant qu'on tape ===== */
// Mémorise les écritures locales récentes pour ignorer l'écho Realtime.
const _selfEdits={};
function markSelfEdit(id){_selfEdits[id]=Date.now();}
function isSelfEdit(id){const t=_selfEdits[id];return t&&(Date.now()-t<6000);}
// Vrai si l'utilisateur est en train d'éditer un champ (input/textarea/select).
function isEditingField(){
  const el=document.activeElement;if(!el)return false;
  const tag=el.tagName;
  return tag==="INPUT"||tag==="TEXTAREA"||tag==="SELECT"||el.isContentEditable;
}
// Render qui n'interrompt jamais une saisie en cours : si un champ a le focus,
// on diffère le render et on le rejoue dès que la saisie est terminée.
let _pendingRender=false,_pendRenderPoll=null;
function flushPendingRender(){
  if(isEditingField())return;            // toujours en train de taper → on attend
  if(_pendRenderPoll){clearInterval(_pendRenderPoll);_pendRenderPoll=null;}
  if(_pendingRender){_pendingRender=false;render();}
}
function safeRender(){
  if(isEditingField()){
    _pendingRender=true;
    // Poll léger qui ne vit que tant qu'un render est en attente ET qu'un champ est focus.
    if(!_pendRenderPoll)_pendRenderPoll=setInterval(flushPendingRender,300);
    return;
  }
  render();
}
// Sur les vrais navigateurs, le blur déclenche un flush immédiat (sans attendre le poll).
document.addEventListener("focusout",()=>{if(_pendingRender)setTimeout(flushPendingRender,60);},true);

let _realtimeCh=null;
function setupRealtime(){
  if(!sb||_realtimeCh)return;
  try{
    _realtimeCh=sb.channel("contenus-live")
      .on("postgres_changes",{event:"*",schema:"public",table:"contenus"},payload=>{
        const ev=payload.eventType;
        if(ev==="INSERT"){
          const c=payload.new;if(!state.contenus.find(x=>x.id===c.id)){state.contenus.push({...c,source:c.source||"upload"});if(!isSelfEdit(c.id))toast("✓ Nouveau contenu ajouté","ok",2000);safeRender();}
        }else if(ev==="UPDATE"){
          const c=payload.new;const i=state.contenus.findIndex(x=>x.id===c.id);
          if(i>=0){
            state.contenus[i]={...state.contenus[i],...c};
            // Écho de notre propre sauvegarde OU saisie en cours → on ne re-render PAS
            // (les données sont déjà à jour en mémoire, le prochain render naturel les prendra).
            if(!isSelfEdit(c.id))safeRender();
          }
        }else if(ev==="DELETE"){
          state.contenus=state.contenus.filter(x=>x.id!==payload.old.id);safeRender();
        }
      })
      .on("postgres_changes",{event:"*",schema:"public",table:"categories"},()=>{loadCategories();})
      .on("postgres_changes",{event:"*",schema:"public",table:"tutor_applications"},payload=>{
        const ev=payload.eventType;
        // Côté admin : on tient la liste à jour en direct
        if(state._apps){
          if(ev==="INSERT"){if(!state._apps.find(a=>a.id===payload.new.id))state._apps.unshift(payload.new);}
          else if(ev==="UPDATE"){const i=state._apps.findIndex(a=>a.id===payload.new.id);if(i>=0)state._apps[i]={...state._apps[i],...payload.new};}
          else if(ev==="DELETE"){state._apps=state._apps.filter(a=>a.id!==payload.old.id);}
        }
        // Côté candidat : sa propre candidature change → statut live + notif
        if(state._myApp&&payload.new&&payload.new.id===state._myApp.id){
          const prev=state._myApp.status;
          state._myApp={...state._myApp,...payload.new};
          if(ev==="UPDATE"&&payload.new.status!==prev){
            if(payload.new.status==="accepted")toast("🎉 Ta candidature tuteur a été ACCEPTÉE ! Va voir « Devenir tuteur ».","ok",7000);
            else if(payload.new.status==="rejected")toast("Ta candidature tuteur n'a pas été retenue cette fois.","warn",6000);
          }
        }
        if(state._myApp&&ev==="DELETE"&&payload.old&&payload.old.id===state._myApp.id){state._myApp=null;state._reapply=false;}
        safeRender();
      })
      .subscribe();
  }catch(e){console.warn("Realtime:",e.message);}
}

const _noteTimers={};const _noteSaving={};
async function updNote(contenu_id,texte){
  if(!sb||!state.user)return;
  state.currentNote={...(state.currentNote||{}),contenu_id,texte};
  if(_noteTimers[contenu_id])clearTimeout(_noteTimers[contenu_id]);
  _noteTimers[contenu_id]=setTimeout(async()=>{
    if(_noteSaving[contenu_id])return;_noteSaving[contenu_id]=true;
    try{const{data:u}=await sb.auth.getUser();if(!u||!u.user)return;
      const cur=state.currentNote||{};
      if(cur.id){
        // Note déjà créée → simple update (pas de doublon)
        await sb.from("notes").update({texte,updated_at:new Date().toISOString()}).eq("id",cur.id);
      }else{
        // 1ère sauvegarde → insert + on capture l'id pour les suivantes
        const{data,error}=await sb.from("notes").insert({user_id:u.user.id,contenu_id,texte}).select("id").maybeSingle();
        if(!error&&data&&state.currentNote)state.currentNote.id=data.id;
      }
      toast("✓ Note enregistrée","ok",1200);
    }catch(e){}finally{_noteSaving[contenu_id]=false;}
  },800);
}

/* ===== Recherche ===== */
function performSearch(q){
  const ql=(q||"").toLowerCase().trim();
  const f=state.searchFilters||{};
  const hasFilter=f.univ||f.faculte||f.annee;
  // Si aucun texte ET aucun filtre → rien. Avec un filtre seul, on liste tout ce qui matche.
  if(!ql&&!hasFilter)return [];
  // Verrouillage : un étudiant non-admin ne voit que sa fac/filière + ses niveaux débloqués
  const locked=state.user&&!isAdminUser()&&hasProfile();
  const lockUniv=locked?state.profile.univ:null, lockFac=locked?state.profile.faculte:null;
  const acc=locked?myAccess():null;
  return state.contenus.filter(c=>{
    if(lockUniv&&c.univ!==lockUniv)return false;
    if(lockFac&&c.faculte!==lockFac)return false;
    if(acc&&!acc.allowed(c.annee,c.semestre||"S1"))return false;
    if(f.univ&&c.univ!==f.univ)return false;
    if(f.faculte&&c.faculte!==f.faculte)return false;
    if(f.annee&&c.annee!==f.annee)return false;
    if(!ql)return true;
    const blob=((c.titre||"")+" "+(c.matiere||"")+" "+(c.tuteur||"")+" "+(c.description||"")+" "+labelFor(c.type)+" "+(c.annee||"")).toLowerCase();
    return blob.includes(ql);
  }).slice(0,30);
}

async function uploadAvatar(file){
  if(!file||!sb||!state.user){toast("Pas connecté","err");return;}
  if(!file.type.startsWith("image/")){toast("Image uniquement","err");return;}
  if(file.size>4*1024*1024){toast("Image trop grosse (max 4 Mo)","err");return;}
  toast("📤 Upload de la photo…","ok",1500);
  try{
    const{data:u}=await sb.auth.getUser();if(!u||!u.user)return;
    const ext=(file.name.match(/\.[^.]+$/)||[".jpg"])[0];
    const path=`${u.user.id}${ext}`;
    const{error}=await sb.storage.from("avatars").upload(path,file,{upsert:true,contentType:file.type});
    if(error){toast("Échec upload : "+error.message,"err",4000);return;}
    const{data:urlData}=sb.storage.from("avatars").getPublicUrl(path);
    const avatar_url=urlData.publicUrl+"?t="+Date.now(); // cache bust
    await saveProfile({avatar_url});
    state.profile={...(state.profile||{}),avatar_url};
    render();
  }catch(e){toast("Erreur : "+e.message,"err");}
}
// ===== Documents privés (CV / relevé de notes) — bucket "documents", scopé par dossier {user_id}/ =====
async function uploadDoc(file,kind){
  // kind : "cv" | "releve"
  if(!file||!sb||!state.user){toast("Pas connecté","err");return;}
  const okTypes=["application/pdf","image/png","image/jpeg","image/jpg","application/msword","application/vnd.openxmlformats-officedocument.wordprocessingml.document"];
  if(file.type&&!okTypes.includes(file.type)){toast("PDF, image ou Word uniquement","err",3500);return;}
  if(file.size>10*1024*1024){toast("Fichier trop gros (max 10 Mo)","err",3500);return;}
  const label=kind==="cv"?"CV":"relevé de notes";
  toast("📤 Upload du "+label+"…","ok",1500);
  try{
    const{data:u}=await sb.auth.getUser();if(!u||!u.user)return;
    const ext=(file.name.match(/\.[^.]+$/)||[".pdf"])[0].toLowerCase();
    const path=`${u.user.id}/${kind}${ext}`;
    // Nettoie d'éventuelles anciennes versions avec une autre extension
    const oldPath=kind==="cv"?(state.profile||{}).cv_path:(state.profile||{}).releve_path;
    if(oldPath&&oldPath!==path){try{await sb.storage.from("documents").remove([oldPath]);}catch(e){}}
    const{error}=await sb.storage.from("documents").upload(path,file,{upsert:true,contentType:file.type||"application/octet-stream"});
    if(error){toast("Échec upload : "+error.message,"err",4000);return;}
    const field=kind==="cv"?"cv_path":"releve_path";
    await saveProfile({[field]:path});
    state.profile={...(state.profile||{}),[field]:path};
    toast("✓ "+label.charAt(0).toUpperCase()+label.slice(1)+" enregistré","ok");
    render();
  }catch(e){toast("Erreur : "+e.message,"err");}
}
async function openDoc(path,filename){
  if(!path||!sb)return;
  try{
    const{data,error}=await sb.storage.from("documents").createSignedUrl(path,3600,{download:filename||true});
    if(error||!data){toast("Lien indisponible : "+((error&&error.message)||"erreur"),"err",4000);return;}
    const a=document.createElement("a");a.href=data.signedUrl;a.download=filename||"";a.target="_blank";a.rel="noopener";document.body.appendChild(a);a.click();a.remove();
  }catch(e){toast("Erreur : "+e.message,"err");}
}

    if(path){try{await sb.storage.from("documents").remove([path]);}catch(e){}}

    toast("✓ "+label.charAt(0).toUpperCase()+label.slice(1)+" supprimé","ok");

}

async function startCheckout(plan){
  if(CONFIG.FUNCTIONS_URL&&sb&&state.user){
    try{const t=await authToken();const res=await fetch(CONFIG.FUNCTIONS_URL+"/create-checkout",{method:"POST",headers:{"Content-Type":"application/json","Authorization":"Bearer "+t},body:JSON.stringify({plan})});const j=await res.json();if(j&&j.url){window.location.href=j.url;return;}}catch(e){}
  }
  goCheckout(plan);
}
async function downloadProtected(id){
  if(!(CONFIG.FUNCTIONS_URL&&sb&&state.user)){alert("Téléchargement protégé disponible une fois le backend connecté (voir le README).");return;}
  try{const t=await authToken();const res=await fetch(CONFIG.FUNCTIONS_URL+"/download?id="+encodeURIComponent(id),{headers:{"Authorization":"Bearer "+t}});if(!res.ok){alert("Accès refusé : abonnement requis.");return;}const blob=await res.blob();const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download="studia-"+id;document.body.appendChild(a);a.click();a.remove();}catch(e){alert("Erreur : "+e.message);}
}

/* ===== Supabase : persistance contenus ===== */
function dbRow(c){
  return {id:c.id,source:c.source||"upload",univ:c.univ,faculte:c.faculte,annee:c.annee,matiere:c.matiere,type:c.type,
    semestre:c.semestre||"S1",
    titre:c.titre,tuteur:c.tuteur,note:c.note,duree:c.duree,gratuit:!!c.gratuit,flagship:!!c.flagship,
    file_path:c.file_path||null,corrige_path:c.corrige_path||null,
    video_url:c.video_url||null,video_corrige_url:c.video_corrige_url||null,
    description:c.description||null,
    account:c.account||ACCOUNT,email:c.email||(state.user&&state.user.email)||null,date:c.date||today(),ts:c.ts||Date.now()};
}
async function dbInsertContenu(c){if(!sb){toast("Pas de connexion DB","warn");return{ok:false,offline:true};}try{const{error}=await sb.from("contenus").insert(dbRow(c));if(error){console.warn("insert:",error.message);toast("Échec sauvegarde : "+error.message,"err",5000);return{ok:false,error:error.message};}toast("Contenu créé en base","ok");return{ok:true};}catch(e){toast("Erreur : "+e.message,"err");return{ok:false,error:e.message};}}
async function dbUpdateContenu(id,fields){if(!sb)return;try{const{error}=await sb.from("contenus").update(fields).eq("id",id);if(error){console.warn("update:",error.message);toast("Échec sauvegarde champ","err");}else{toast("✓ Modif enregistrée","ok",1500);}}catch(e){console.warn(e);toast("Erreur DB","err");}}
async function dbDeleteContenu(id,file_path,corrige_path){if(!sb)return;try{const paths=[file_path,corrige_path].filter(Boolean);if(paths.length){try{await sb.storage.from("sujets").remove(paths);}catch(e){}}const{error}=await sb.from("contenus").delete().eq("id",id);if(error){console.warn("delete:",error.message);toast("Échec suppression","err");}else{toast("Contenu supprimé","ok");}}catch(e){console.warn(e);toast("Erreur DB","err");}}
async function dbUploadFile(file,id){
  if(!sb){toast("Pas de connexion Storage","warn");return null;}
  try{
    const ext=(file.name.match(/\.[^.]+$/)||[""])[0]||"";
    const path=`${id}${ext}`;
    const{error}=await sb.storage.from("sujets").upload(path,file,{upsert:true,contentType:file.type||undefined});
    if(error){console.warn("storage upload:",error.message);toast("Upload échoué : "+error.message,"err",5000);return null;}
    toast("📁 Fichier uploadé dans le bucket","ok");
    return path;
  }catch(e){console.warn(e);toast("Erreur upload","err");return null;}
}

/* ===== Profile / Tracking ===== */
function profileCacheKey(){return state.user&&state.user.email?`studia_profile_${state.user.email}`:null;}
function loadProfileFromCache(){
  const k=profileCacheKey();if(!k)return null;
  try{const s=localStorage.getItem(k);if(s){state.profile=JSON.parse(s);return state.profile;}}catch(e){}
  return null;
}
function saveProfileToCache(p){
  const k=profileCacheKey();if(!k||!p)return;
  try{localStorage.setItem(k,JSON.stringify(p));}catch(e){}
}
async function loadProfile(){
  if(!sb||!state.user)return;
  // 1) Restaure le cache local d'abord (affichage immédiat)
  loadProfileFromCache();
  try{const{data:u}=await sb.auth.getUser();if(!u||!u.user)return;
    const{data,error}=await sb.from("profiles").select("*").eq("user_id",u.user.id).maybeSingle();
    if(!error&&data){state.profile=data;saveProfileToCache(data);}
  }catch(e){console.warn("loadProfile:",e.message);}
}
async function saveProfile(fields){
  if(!sb||!state.user)return{ok:false};
  try{const{data:u}=await sb.auth.getUser();if(!u||!u.user)return{ok:false};
    const row={user_id:u.user.id,...fields,updated_at:new Date().toISOString()};
    const{error}=await sb.from("profiles").upsert(row);
    if(error){toast("Échec sauvegarde profil","err");return{ok:false,error:error.message};}
    state.profile={...(state.profile||{}),...row};
    toast("✓ Profil enregistré","ok");return{ok:true};
  }catch(e){return{ok:false,error:e.message};}
}
async function trackView(contenu_id){
  if(!sb||!state.user||!contenu_id)return;
  try{const{data:u}=await sb.auth.getUser();if(!u||!u.user)return;
    // Cherche s'il y a déjà une vue pour ce contenu → update plutôt qu'insert
    const{data:existing}=await sb.from("views").select("id,duration_seconds").eq("user_id",u.user.id).eq("contenu_id",contenu_id).maybeSingle();
    if(existing){state._currentView={id:existing.id,base:existing.duration_seconds||0};}
    else{const{data:ins}=await sb.from("views").insert({user_id:u.user.id,contenu_id,duration_seconds:0}).select("id").single();if(ins)state._currentView={id:ins.id,base:0};}
  }catch(e){console.warn("trackView:",e.message);}
}
async function flushTimeSpent(seconds){
  if(!sb||!state._currentView||!seconds)return;
  try{
    const total=(state._currentView.base||0)+seconds;
    await sb.from("views").update({duration_seconds:total,updated_at:new Date().toISOString()}).eq("id",state._currentView.id);
    state._currentView.base=total;
  }catch(e){}
}
async function loadMyStats(){
  if(!sb||!state.user)return null;
  try{const{data:u}=await sb.auth.getUser();if(!u||!u.user)return null;
    const{data:views}=await sb.from("views").select("contenu_id,duration_seconds,updated_at").eq("user_id",u.user.id).order("updated_at",{ascending:false});
    if(!views)return {count:0,seconds:0,recent:[]};
    const total=views.reduce((s,v)=>s+(v.duration_seconds||0),0);
    return {count:views.length,seconds:total,recent:views.slice(0,6)};
  }catch(e){return null;}
}
async function lookupDownload(token){
  if(!sb)return null;
  try{
    const{data,error}=await sb.from("downloads").select("*,contenus(*)").eq("token",token).maybeSingle();
    if(error||!data)return null;
    // récupère le user via auth si possible (l'admin a la policy admin_read)
    let userInfo=null;
    try{const{data:ud}=await sb.auth.admin.getUserById(data.user_id);if(ud)userInfo=ud.user;}catch(e){}
    return{download:data,user:userInfo,contenu:data.contenus};
  }catch(e){return null;}
}

/* ===== Commentaires ===== */
async function loadComments(contenu_id){
  if(!sb)return [];
  try{
    const{data}=await sb.from("comments").select("*").eq("contenu_id",contenu_id).order("created_at",{ascending:false});
    if(!data)return [];
    // enrichit avec prénom/nom du profil
    const userIds=[...new Set(data.map(c=>c.user_id))];
    if(!userIds.length)return data;
    const{data:profs}=await sb.from("profiles").select("user_id,prenom,nom").in("user_id",userIds);
    const pMap=Object.fromEntries((profs||[]).map(p=>[p.user_id,p]));
    return data.map(c=>({...c,profile:pMap[c.user_id]||null}));
  }catch(e){return [];}
}
async function postComment(contenu_id,texte){
  if(!sb||!state.user)return{ok:false};
  try{
    const{data:u}=await sb.auth.getUser();if(!u||!u.user)return{ok:false};
    const{error}=await sb.from("comments").insert({contenu_id,user_id:u.user.id,texte});
    if(error){toast("Échec : "+error.message,"err");return{ok:false};}
    toast("✓ Commentaire publié","ok");return{ok:true};
  }catch(e){return{ok:false};}
}
async function deleteComment(id){
  if(!sb)return;
  if(!confirm("Supprimer ce commentaire ?"))return;
  try{const{error}=await sb.from("comments").delete().eq("id",id);if(error){toast(error.message,"err");return;}toast("Commentaire supprimé","ok");state.comments=(state.comments||[]).filter(c=>c.id!==id);render();}catch(e){}
}
async function submitComment(contenu_id){
  const t=document.getElementById("commentTexte");
  if(!t)return;
  const v=t.value.trim();
  if(!v){toast("Écris quelque chose d'abord","warn");return;}
  const r=await postComment(contenu_id,v);
  if(r.ok){t.value="";state.comments=await loadComments(contenu_id);render();}
}

/* ===== Signaler une erreur (feedback par sujet) ===== */
async function reportError(contenu_id){
  if(!sb||!state.user){toast("Connecte-toi pour signaler une erreur","warn");nav("login");return;}
  const msg=prompt("Décris l'erreur repérée (faute, mauvaise réponse, page manquante, lien cassé…) :");
  if(!msg||!msg.trim())return;
  try{const{data:u}=await sb.auth.getUser();if(!u||!u.user)return;
    const{error}=await sb.from("signalements").insert({contenu_id,user_id:u.user.id,email:state.user.email,message:msg.trim()});
    if(error){toast("Échec : "+error.message,"err",4000);return;}
    toast("✓ Merci ! Ton signalement a été transmis à l'équipe.","ok",3500);
  }catch(e){toast("Erreur : "+e.message,"err");}
}
async function loadSignalements(){
  if(!sb)return;
  state._signalLoading=true;render();
  try{const{data}=await sb.from("signalements").select("*").order("created_at",{ascending:false});state._signalements=data||[];}catch(e){state._signalements=[];}

async function resolveSignalement(id,status){
  if(!sb)return;
  try{await sb.from("signalements").update({status:status||"resolved"}).eq("id",id);loadSignalements();}catch(e){toast("Erreur","err");}
}
async function deleteSignalement(id){
  if(!sb)return;if(!confirm("Supprimer définitivement ce signalement ?"))return;
  try{await sb.from("signalements").delete().eq("id",id);state._signalements=(state._signalements||[]).filter(s=>s.id!==id);render();}catch(e){toast("Erreur","err");}
}
function adminOpenContenu(id){const c=state.contenus.find(x=>x.id===id);if(!c)return;state.univ=univById(c.univ);state.faculte=facById(c.univ,c.faculte);state.matiere=c.matiere;state.annee=c.annee;state.semestre=c.semestre||"S1";openItem(id);}

/* ===== Entraide : contributions étudiantes ===== */
function openContribute(){
  if(!state.user){toast("Connecte-toi pour proposer un document","warn");nav("login");return;}
  state.contribOpen=true;
  const p=state.profile||{};
  state._contribForm={univ:p.univ||"uca",faculte:p.faculte||"",annee:p.annee||"L1"};
  state._contribBusy=false;
  renderContribute();
}
function closeContribute(){state.contribOpen=false;const r=document.getElementById("modalRoot");if(r&&!state.searchOpen&&!state.modal&&!(state.newC&&state.newC.open))r.innerHTML="";}
function cbUnivChange(v){
  state._contribForm=Object.assign({},state._contribForm||{},{univ:v,faculte:""});
  const u=univById(v);
  const sel=document.getElementById("cbFaculte");
  if(sel)sel.innerHTML=((u&&u.facultes)||[]).map(f=>`<option value="${f.id}">${esc(f.nom)}</option>`).join("")||'<option value="">—</option>';
}
function renderContribute(){
  const r=document.getElementById("modalRoot");if(!r)return;
  if(!state.contribOpen)return;
  const cf=state._contribForm||{};
  const locked=state.user&&!isAdminUser()&&hasProfile(); // étudiant verrouillé sur sa fac
  const u=univById(cf.univ||"uca");
  const facs=(u&&u.facultes)||[];
  const busy=!!state._contribBusy;
  const sel="width:100%;padding:9px 10px;font-size:13.5px;border:1px solid var(--border);border-radius:8px;background:#fff;color:var(--text)";
  r.innerHTML=`<div class="modal-bg" onclick="closeContribute()"><div class="modal fade" onclick="event.stopPropagation()" style="max-width:520px">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px"><h3 class="serif" style="font-size:22px;color:var(--ink);margin:0">Proposer un document</h3><button style="background:none;border:none;color:var(--muted);cursor:pointer;font-size:18px" onclick="closeContribute()">✕</button></div>
    <p class="muted" style="margin:0 0 16px;font-size:13px;line-height:1.5">Partage <b>n'importe quel document utile en rapport avec ta fac</b> : cours, fiches, corrigés, mais aussi <b>examens finaux officiels, sujets d'examen, TD officiels</b>, annales… L'équipe vérifie chaque document avant publication — il ne sera pas visible immédiatement.</p>
    <div style="display:grid;gap:10px">
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px">
        <div><label class="muted" style="font-size:11px;display:block;margin-bottom:4px">Université</label>
          <select id="cbUniv" style="${sel}" ${locked?"disabled":""} onchange="cbUnivChange(this.value)">${UNIVS.map(x=>`<option value="${x.id}" ${cf.univ===x.id?"selected":""}>${esc(x.nom)}</option>`).join("")}</select></div>
        <div><label class="muted" style="font-size:11px;display:block;margin-bottom:4px">Filière</label>
          <select id="cbFaculte" style="${sel}" ${locked?"disabled":""}>${facs.map(f=>`<option value="${f.id}" ${cf.faculte===f.id?"selected":""}>${esc(f.nom)}</option>`).join("")||'<option value="">—</option>'}</select></div>
        <div><label class="muted" style="font-size:11px;display:block;margin-bottom:4px">Année</label>
          <select id="cbAnnee" style="${sel}">${["L1","L2","L3","M1","M2"].map(a=>`<option value="${a}" ${cf.annee===a?"selected":""}>${a}</option>`).join("")}</select></div>
      </div>
      <div style="display:grid;grid-template-columns:2fr 1fr;gap:8px">
        <div><label class="muted" style="font-size:11px;display:block;margin-bottom:4px">Matière *</label>
          <input id="cbMatiere" class="input" placeholder="Ex. Microéconomie" value="${esc(cf.matiere||"")}"/></div>
        <div><label class="muted" style="font-size:11px;display:block;margin-bottom:4px">Type</label>
          <select id="cbType" style="${sel}">${globalCats().map(t=>`<option value="${t.id}">${esc(t.label)}</option>`).join("")}</select></div>
      </div>
      <div><label class="muted" style="font-size:11px;display:block;margin-bottom:4px">Titre *</label>
        <input id="cbTitre" class="input" placeholder="Ex. Fiche de révision chapitre 3" value="${esc(cf.titre||"")}"/></div>
      <div><label class="muted" style="font-size:11px;display:block;margin-bottom:4px">Description (optionnel)</label>

      <div><label class="muted" style="font-size:11px;display:block;margin-bottom:4px">Fichier (PDF ou image, max 20 Mo) *</label>
        <input id="cbFile" type="file" accept="image/*,application/pdf" style="font-size:13px"/></div>
    </div>
    <div style="display:flex;gap:8px;margin-top:16px">
      <button class="btn btn-ghost" style="flex:1" onclick="closeContribute()">Annuler</button>

async function submitContribution(){
  if(!sb||!state.user){toast("Connecte-toi pour proposer un document","warn");nav("login");return;}
  const get=id=>(document.getElementById(id)||{}).value||"";
  const fileEl=document.getElementById("cbFile");
  const theFile=fileEl&&fileEl.files&&fileEl.files[0];
  const f={univ:get("cbUniv"),faculte:get("cbFaculte"),annee:get("cbAnnee"),matiere:get("cbMatiere").trim(),type:get("cbType"),titre:get("cbTitre").trim(),description:get("cbDesc").trim()};
  // mémorise la saisie au cas où l'upload échoue (on re-render le modal)
  state._contribForm=Object.assign({},state._contribForm,f);
  if(!f.titre||!f.matiere){toast("Titre et matière sont obligatoires","err");return;}
  if(!theFile){toast("Ajoute un fichier (PDF ou image)","err");return;}
  if(theFile.size>20*1024*1024){toast("Fichier trop lourd (max 20 Mo)","err");return;}
  state._contribBusy=true;renderContribute();
  try{const{data:u}=await sb.auth.getUser();if(!u||!u.user){state._contribBusy=false;renderContribute();return;}
    const ext=(theFile.name.match(/\.[^.]+$/)||[""])[0]||"";
    const path=`${u.user.id}/${Date.now()}_${Math.random().toString(36).slice(2,7)}${ext}`;
    const{error:upErr}=await sb.storage.from("contributions").upload(path,theFile,{contentType:theFile.type||undefined});
    if(upErr){state._contribBusy=false;renderContribute();toast("Échec upload : "+upErr.message,"err",5000);return;}
    const{error}=await sb.from("contributions").insert({user_id:u.user.id,email:state.user.email,univ:f.univ,faculte:f.faculte,annee:f.annee,matiere:f.matiere,type:f.type,titre:f.titre,description:f.description||null,file_path:path,file_name:theFile.name});
    if(error){state._contribBusy=false;renderContribute();toast("Échec : "+error.message,"err",5000);return;}
    state.contribOpen=false;state._contribForm=null;state._contribBusy=false;
    const r=document.getElementById("modalRoot");if(r)r.innerHTML="";
    toast("✓ Merci ! Ta proposition a été envoyée. L'équipe la vérifie avant publication.","ok",4500);
  }catch(e){state._contribBusy=false;renderContribute();toast("Erreur : "+e.message,"err");}
}
async function loadContributions(){
  if(!sb)return;
  state._contribLoading=true;render();
  try{const{data}=await sb.from("contributions").select("*").order("created_at",{ascending:false});state._contributions=data||[];}catch(e){state._contributions=[];}
  state._contribLoading=false;render();
}

async function downloadContribution(path){
  if(!sb)return;
  const c=(state._contributions||[]).find(x=>x.file_path===path);
  const filename=(c&&c.file_name)||(path.split("/").pop());
  toast("⬇ Préparation du téléchargement…","ok",1500);
  try{
    // download:filename => le lien force un vrai téléchargement (Content-Disposition: attachment),
    // donc pas de pop-up bloqué et le fichier descend directement.
    const{data,error}=await sb.storage.from("contributions").createSignedUrl(path,3600,{download:filename||true});
    if(error||!data){toast("Téléchargement impossible : "+((error&&error.message)||"fichier introuvable"),"err",4500);return;}
    const a=document.createElement("a");
    a.href=data.signedUrl;a.download=filename||"";a.rel="noopener";a.style.display="none";
    document.body.appendChild(a);a.click();setTimeout(()=>a.remove(),0);
  }catch(e){toast("Erreur : "+e.message,"err",4000);}
}
async function updateContribution(id,status){
  if(!sb)return;
  const list=state._contributions||[];
  const idx=list.findIndex(c=>c.id===id);
  const prev=idx>=0?list[idx].status:undefined;
  if(idx>=0){list[idx]={...list[idx],status};render();} // optimiste
  const lbl=status==="processed"?"Traité":status==="rejected"?"Rejeté":"En attente";
  try{
    const{error}=await sb.from("contributions").update({status}).eq("id",id);
    if(error)throw error;
    toast("✓ "+lbl,"ok",1800);
  }catch(e){
    if(idx>=0){list[idx]={...list[idx],status:prev};render();} // rollback
    toast("Échec de la mise à jour : "+(e.message||"erreur"),"err",4500);
  }
}
async function deleteContribution(id,path){
  if(!sb)return;if(!confirm("Supprimer définitivement cette proposition et son fichier ?"))return;
  const before=state._contributions||[];
  const removed=before.find(c=>c.id===id);
  state._contributions=before.filter(c=>c.id!==id);render(); // optimiste
  try{
    const{error}=await sb.from("contributions").delete().eq("id",id);
    if(error)throw error;
    if(path){try{await sb.storage.from("contributions").remove([path]);}catch(_){/* fichier déjà absent : non bloquant */}}
    toast("🗑 Proposition supprimée","ok",1800);
  }catch(e){
    if(removed){state._contributions=before;render();} // rollback
    toast("Suppression impossible : "+(e.message||"erreur"),"err",4500);
  }
}

async function fetchPDFFromBucket(file_path){
  if(!sb)return null;
  try{
    // sujets est privé → on génère un signed URL (1h)
    const{data,error}=await sb.storage.from("sujets").createSignedUrl(file_path,3600);
    if(error||!data)return null;
    const res=await fetch(data.signedUrl);
    if(!res.ok)return null;
    return await res.blob();
  }catch(e){return null;}
}
function makeUserToken(contenu_id){
  const uid=state.user?(state.user.email||"anonymous"):"anonymous";
  const d=today();
  const rand=Math.random().toString(36).slice(2,6);
  return `STUDIA|${contenu_id}|u:${uid}|${d}|${rand}`;
}
async function watermarkPDFBlob(blob,token,userLabel){
  const doc=await PDFLib.PDFDocument.load(await blob.arrayBuffer(),{ignoreEncryption:true});
  const qrDataUrl=await makeQR(token,200);
  const png=await doc.embedPng(await (await fetch(qrDataUrl)).arrayBuffer());
  const font=await doc.embedFont(PDFLib.StandardFonts.Helvetica);
  const fontBold=await doc.embedFont(PDFLib.StandardFonts.HelveticaBold);
  const label=userLabel||"abonné";
  const date=new Date().toLocaleDateString("fr-FR");
  doc.getPages().forEach((p,i)=>{
    const{width:W,height:H}=p.getSize();
    // Bandeau header vert clair
    p.drawRectangle({x:0,y:H-22,width:W,height:22,color:PDFLib.rgb(.91,.97,.93),opacity:.92});
    p.drawText("Studia · Tous droits réservés",{x:14,y:H-15,size:9,font:fontBold,color:PDFLib.rgb(.12,.55,.24)});
    const rightText=`${label} · ${date}`;
    const rightW=font.widthOfTextAtSize(rightText,9);
    p.drawText(rightText,{x:W-rightW-14,y:H-15,size:9,font:font,color:PDFLib.rgb(.35,.35,.35)});
    // QR discret coin haut-droit
    const s=Math.max(34,Math.min(W,H)*.045);
    p.drawImage(png,{x:W-s-10,y:H-s-30,width:s,height:s,opacity:.55});
    // QR discret coin bas-gauche
    p.drawImage(png,{x:10,y:10,width:s,height:s,opacity:.45});
    // Footer
    p.drawText(`Reproduction non autorisée · QR traçable · p. ${i+1}`,{x:14,y:s+18,size:7,font:font,color:PDFLib.rgb(.55,.55,.55)});
  });
  return new Blob([await doc.save()],{type:"application/pdf"});
}
async function preparePDFForView(contenu,filePath){
  if(!filePath)return;
  state._pdfStatus="loading";render();
  try{
    const blob=await fetchPDFFromBucket(filePath);
    if(!blob){state._pdfStatus="error";render();return;}
    const token=makeUserToken(contenu.id);
    const p=state.profile||{};
    const userLabel=((p.prenom||"")+" "+(p.nom||"")).trim()||(state.user&&state.user.email)||"abonné";
    const wm=await watermarkPDFBlob(blob,token,userLabel);
    const url=URL.createObjectURL(wm);
    state._pdfUrl=url;state._pdfToken=token;state._pdfStatus="ready";
    // log dans downloads pour traçabilité
    if(sb&&state.user){
      try{const{data:u}=await sb.auth.getUser();if(u&&u.user)await sb.from("downloads").insert({user_id:u.user.id,contenu_id:contenu.id,token});}catch(e){}
    }
    render();
  }catch(e){console.warn(e);state._pdfStatus="error";render();}
}
function disposePDF(){
  if(state._pdfUrl){URL.revokeObjectURL(state._pdfUrl);state._pdfUrl=null;}
  state._pdfStatus=null;state._pdfToken=null;

  if(state._corrUrl){URL.revokeObjectURL(state._corrUrl);state._corrUrl=null;}

}
async function prepareCorrigeForView(contenu,corrigePath){

/* ===== Anti-capture (best-effort web) ===== */
let _antiCaptureInit=false;
function initAntiCapture(){
  if(_antiCaptureInit)return;_antiCaptureInit=true;
  document.addEventListener("visibilitychange",()=>{
    if(document.hidden&&document.querySelector(".hidden-on-blur"))document.body.classList.add("hide-content");
    else setTimeout(()=>document.body.classList.remove("hide-content"),200);
  });
  document.addEventListener("keydown",e=>{
    // macOS screenshot: Cmd+Shift+3/4/5  | Windows: PrintScreen
    if((e.metaKey&&e.shiftKey&&["3","4","5"].includes(e.key))||e.key==="PrintScreen"){
      document.body.classList.add("hide-content");
      setTimeout(()=>document.body.classList.remove("hide-content"),2000);
    }
  });
  document.addEventListener("contextmenu",e=>{if(e.target.closest(".pdf-wrap,.player-wrap"))e.preventDefault();});
}

function parseVideoEmbed(url,autoplay){
  if(!url)return null;
  const u=url.trim();
  const a=autoplay?1:0;
  let m=u.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/embed\/|youtube\.com\/shorts\/)([A-Za-z0-9_-]{11})/);
  if(m)return{kind:"youtube",embed:`https://www.youtube-nocookie.com/embed/${m[1]}?rel=0&modestbranding=1&playsinline=1&autoplay=${a}&mute=${a}`,thumb:`https://i.ytimg.com/vi/${m[1]}/hqdefault.jpg`};
  m=u.match(/vimeo\.com\/(?:video\/)?(\d+)/);
  if(m)return{kind:"vimeo",embed:`https://player.vimeo.com/video/${m[1]}?autoplay=${a}&muted=${a}`,thumb:null};
  if(/\.(mp4|webm|mov|m4v)(\?|$)/i.test(u))return{kind:"file",embed:u,thumb:null};
  return null;
}

/* ===== Stats / Animations ===== */
function computeStats(){
  const cs=state.contenus||[];
  const cours=cs.filter(c=>c.type==="Cours").length;
  const td=cs.filter(c=>c.type==="TD").length;
  const midterms=cs.filter(c=>c.type==="Midterm").length;
  const examens=cs.filter(c=>c.type==="Examen").length+midterms;
  const minutes=cs.reduce((s,c)=>{const m=(c.duree||"").match(/(\d+)/);return s+(m?+m[1]:0);},0);
  const heures=Math.max(1,Math.round(minutes/60));
  return {cours,td,examens,heures,total:cs.length};
}
function animateCounter(el,target,dur=1400){
  if(!el)return;
  const start=performance.now();
  const step=t=>{
    const p=Math.min(1,(t-start)/dur);
    const eased=1-Math.pow(1-p,3);
    el.firstChild.nodeValue=Math.round(target*eased).toLocaleString("fr-FR");
    if(p<1)requestAnimationFrame(step);
  };
  requestAnimationFrame(step);
}
function setupReveals(){
  if(!window.IntersectionObserver)return;
  const obs=new IntersectionObserver(entries=>{
    entries.forEach(e=>{
      if(!e.isIntersecting)return;
      e.target.classList.add("in");
      if(e.target.dataset.counter){
        animateCounter(e.target.querySelector(".stat-num"),+e.target.dataset.counter);
      }
      obs.unobserve(e.target);
    });
  },{threshold:.15,rootMargin:"0px 0px -60px 0px"});
  document.querySelectorAll(".reveal:not(.in)").forEach(el=>obs.observe(el));
  // Barre de progression de scroll (handler nommé => pas de fuite entre les rendus).
  window.removeEventListener("scroll",_lpScroll);
  window.addEventListener("scroll",_lpScroll,{passive:true});
  _lpScroll();
  // Parallaxe douce des cartes flottantes (desktop, pointeur précis, hors reduced-motion).
  const hero=document.querySelector(".lp-hero");
  if(hero&&matchMedia("(pointer:fine)").matches&&!matchMedia("(prefers-reduced-motion: reduce)").matches){
    hero.addEventListener("mousemove",_lpParallax);
    hero.addEventListener("mouseleave",_lpParallaxReset);
  }
}
function _lpScroll(){
  const bar=document.getElementById("lp-progress");if(!bar)return;
  const h=document.documentElement,max=h.scrollHeight-h.clientHeight;
  bar.style.transform="scaleX("+(max>0?Math.min(1,h.scrollTop/max):0)+")";
}
function _lpParallax(e){
  const cards=e.currentTarget.querySelectorAll(".lp-float");if(!cards.length)return;
  const r=e.currentTarget.getBoundingClientRect();
  const cx=(e.clientX-r.left)/r.width-.5,cy=(e.clientY-r.top)/r.height-.5;
  cards.forEach((el,i)=>{const d=(i%2?1:-1)*(10+i*4);el.style.translate=(cx*d).toFixed(1)+"px "+(cy*d).toFixed(1)+"px";});
}
function _lpParallaxReset(e){
  e.currentTarget.querySelectorAll(".lp-float").forEach(el=>el.style.translate="0px 0px");
}
function toggleFounder(i){
  const cards=document.querySelectorAll(".founder");
  if(cards[i])cards[i].classList.toggle("open");
}
function lpOffer(btn,key){
  const seg=btn.parentElement;
  seg.querySelectorAll("button").forEach(b=>b.classList.remove("on"));
  btn.classList.add("on");
  const sec=btn.closest("section")||document;
  sec.querySelectorAll(".offer-panel").forEach(p=>p.classList.toggle("on",p.dataset.offer===key));
}
