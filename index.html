<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Studia</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jsQR/1.4.0/jsQR.min.js"></script>

<style>
@import url('https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Instrument+Serif:ital@0;1&display=swap');
:root{--bg:#FBFBFA;--surface:#FFFFFF;--border:#EAE9E6;--borderStrong:#DEDDD9;--ink:#1A1A18;--text:#37352F;--sub:#6F6E69;--muted:#9B9A94;--accent:#0F7A6B;--accentSoft:#E7F2EF;--amber:#9A6A18;--amberSoft:#F6EFDF;--sans:'Geist',-apple-system,BlinkMacSystemFont,sans-serif;--serif:'Instrument Serif',Georgia,serif}
*{box-sizing:border-box}
body{margin:0;font-family:var(--sans);background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased}
button{font-family:var(--sans);cursor:pointer}
input,select{font-family:var(--sans)}
a{color:inherit;text-decoration:none}
.hidden{display:none!important}
.wrap{max-width:1100px;margin:0 auto;padding:0 24px}
.logo{width:26px;height:26px;border-radius:7px;background:var(--ink);color:#fff;display:flex;align-items:center;justify-content:center;font-family:var(--serif);font-size:17px}
.serif{font-family:var(--serif);font-weight:400;letter-spacing:-.3px}
.pill{font-size:11.5px;font-weight:500;padding:3px 9px;border-radius:6px;background:var(--accentSoft);color:var(--accent);white-space:nowrap}
.tag{font-size:11.5px;font-weight:500;padding:3px 9px;border-radius:6px;background:#F2F1EE;color:var(--sub);white-space:nowrap}
.tag.amber{background:var(--amberSoft);color:var(--amber)}
.btn{border:1px solid transparent;border-radius:8px;font-weight:500;font-size:14px;padding:9px 16px;display:inline-flex;align-items:center;gap:7px;justify-content:center;transition:opacity .15s}
.btn:hover{opacity:.88}
.btn-ink{background:var(--ink);color:#fff}.btn-accent{background:var(--accent);color:#fff}
.btn-ghost{background:transparent;color:var(--text);border:1px solid var(--borderStrong)}
.btn-sm{padding:6px 12px;font-size:13px}
.btn-lg{padding:12px 22px;font-size:15px}
.input{width:100%;padding:10px 12px;border-radius:8px;border:1px solid var(--borderStrong);background:var(--bg);font-size:14px;color:var(--ink);outline:none}
.input:focus{border-color:var(--accent)}
.card{background:var(--surface);border:1px solid var(--border);border-radius:14px}
.card-h{transition:border-color .15s,transform .15s;cursor:pointer}
.card-h:hover{border-color:var(--borderStrong);transform:translateY(-1px)}
.muted{color:var(--muted);font-size:12px}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.fade{animation:fadeUp .45s ease both}
.nav{position:sticky;top:0;z-index:30;background:rgba(251,251,250,.85);backdrop-filter:blur(8px);border-bottom:1px solid var(--border)}
.nav-in{height:60px;display:flex;align-items:center;justify-content:space-between;gap:10px}
.nav-links{display:flex;align-items:center;gap:4px}
.nav-links .link{background:none;border:none;font-size:14px;padding:7px 12px;border-radius:7px;color:var(--sub)}
.nav-links .link.on{color:var(--ink);font-weight:500}
@media(max-width:820px){.nav-links .link{display:none}}
.ctxbar{border-bottom:1px solid var(--border);background:var(--surface)}
.ctxbar-in{display:flex;align-items:center;gap:8px;padding:10px 0;font-size:13px;color:var(--sub);flex-wrap:wrap}
.crumb{cursor:pointer;padding:3px 9px;border-radius:6px;background:#F2F1EE;color:var(--sub)}
.crumb:hover{color:var(--ink)}
.seg{display:inline-flex;background:#F2F1EE;border-radius:10px;padding:4px;gap:2px;flex-wrap:wrap}
.seg button{border:none;background:transparent;font-size:14px;font-weight:500;padding:8px 18px;border-radius:8px;color:var(--sub)}
.seg button.on{background:var(--surface);color:var(--ink);box-shadow:0 1px 2px rgba(0,0,0,.06)}
.seg.sm button{font-size:12.5px;padding:6px 11px}
.tabs{display:flex;gap:4px;border-bottom:1px solid var(--border);margin-bottom:20px;flex-wrap:wrap}
.tabs button{background:none;border:none;font-size:14.5px;padding:10px 14px;display:flex;align-items:center;gap:7px;color:var(--sub);border-bottom:2px solid transparent;margin-bottom:-1px}
.tabs button.on{color:var(--ink);font-weight:600;border-bottom-color:var(--ink)}
.row{padding:16px;display:flex;align-items:center;gap:14px;margin-bottom:10px}
.ic{width:44px;height:44px;border-radius:9px;display:flex;align-items:center;justify-content:center;flex-shrink:0;background:var(--accentSoft);color:var(--accent);font-size:18px}
.ic.lock{background:#F2F1EE;color:var(--muted)}
.grid{display:grid;gap:14px}
.dz{border:1.5px dashed var(--borderStrong);border-radius:12px;padding:24px 16px;text-align:center;color:var(--sub);transition:all .15s;cursor:pointer}
.dz:hover,.dz.drag{border-color:var(--accent);background:var(--accentSoft)}
.dz strong{color:var(--ink)}
.ctrl{margin-top:14px}
.ctrl-row{display:flex;justify-content:space-between;font-size:13px;color:var(--sub);margin-bottom:6px}
.ctrl-row b{color:var(--ink);font-weight:500}
input[type=range]{width:100%;accent-color:var(--accent)}
.token{font-family:ui-monospace,Menlo,monospace;font-size:11.5px;color:var(--accent);background:var(--accentSoft);padding:3px 7px;border-radius:6px;word-break:break-all}
.thumb{width:70px;height:70px;border-radius:9px;border:1px solid var(--border);background:#F2F1EE;flex-shrink:0;display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:11px;overflow:hidden}
.thumb img{width:100%;height:100%;object-fit:cover}
.qrmini{width:46px;height:46px;border:1px solid var(--border);border-radius:7px;padding:3px;background:#fff;flex-shrink:0}
.qrmini img{width:100%;height:100%}
.note{display:flex;gap:10px;background:var(--amberSoft);border:1px solid #EADFC4;border-radius:12px;padding:14px;font-size:13px;color:#6B5418;line-height:1.55}
.trace-result{margin-top:12px;padding:13px;border-radius:10px;background:var(--accentSoft);font-size:13.5px;line-height:1.6}
.trace-result.miss{background:#FBEDEC;color:#8A3C34}
.modal-bg{position:fixed;inset:0;z-index:60;background:rgba(26,26,24,.45);display:flex;align-items:center;justify-content:center;padding:20px}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:16px;max-width:380px;width:100%;padding:28px}
.sec{padding:60px 0;border-top:1px solid var(--border)}
.photo{position:relative;overflow:hidden;background:linear-gradient(135deg,#0F7A6B,#0b3b34)}
.photo img{width:100%;height:100%;object-fit:cover;display:block}
.hero-img{position:absolute;inset:0;z-index:0;overflow:hidden}
.hero-img img{width:100%;height:100%;object-fit:cover}
.hero-img::after{content:"";position:absolute;inset:0;background:linear-gradient(180deg,rgba(251,251,250,.35),rgba(251,251,250,.9) 72%,var(--bg))}
.burger{display:none;background:none;border:1px solid var(--borderStrong);border-radius:8px;padding:7px 11px;font-size:16px}
@media(max-width:820px){.nav-links{display:none}.burger{display:inline-flex}}
.mobile-menu{border-top:1px solid var(--border)}
.mobile-menu .wrap>button{display:block;width:100%;text-align:left;background:none;border:none;padding:12px 0;font-size:15px;color:var(--text);border-bottom:1px solid var(--border)}
.auth-tab{flex:1;background:none;border:none;padding:10px;font-size:14px;font-weight:500;color:var(--sub);border-bottom:2px solid transparent;cursor:pointer}
.auth-tab.on{color:var(--ink);border-bottom-color:var(--ink)}
#qrfactory{position:fixed;left:-9999px;top:-9999px}
</style>
</head>
<body>
<div id="app"></div>
<div id="modalRoot"></div>
<div id="qrfactory"></div>
<script>
/* ===== CONFIG ===== */
const ACCOUNT="admin", ADMIN_EMAIL="djad@studia.app";
/* ===== À REMPLIR POUR PASSER EN PRODUCTION ===== */
const CONFIG={
  SUPABASE_URL:"https://aswkkhdeiedjlxydxzbn.supabase.co",        // ← https://xxxx.supabase.co
  SUPABASE_ANON_KEY:"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFzd2traGRlaWVkamx4eWR4emJuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA2ODY5OTcsImV4cCI6MjA5NjI2Mjk5N30.w9zsZ2Z6Kh-yQiixNpdCm9wj1Eb-lHYBiWtw3yc-Fnk",   // ← clé "anon public" (jamais la clé secrète !)
  STRIPE_LINK_MENSUEL:"", // ← Stripe Payment Link (abo mensuel)
  STRIPE_LINK_SEMESTRE:"",// ← Stripe Payment Link (abo semestriel)
  FUNCTIONS_URL:"https://aswkkhdeiedjlxydxzbn.supabase.co/functions/v1",       // ← Edge Functions Supabase : https://xxxx.supabase.co/functions/v1
};
const KW={uca:"campus,university",amu:"university,architecture",p1:"paris,building",tse:"campus,modern"};
let sb=null;
function initSupabase(){try{if(CONFIG.SUPABASE_URL&&CONFIG.SUPABASE_ANON_KEY&&window.supabase){sb=window.supabase.createClient(CONFIG.SUPABASE_URL,CONFIG.SUPABASE_ANON_KEY);}}catch(e){console.warn("Supabase init:",e.message);}}
async function loadContenus(){if(!sb)return;try{const{data,error}=await sb.from("contenus").select("*");if(!error&&data&&data.length){state.contenus=data.map(r=>({...r,source:r.source||"seed"}));render();}}catch(e){console.warn("loadContenus:",e.message);}}
async function restoreSession(){if(!sb)return;try{const{data}=await sb.auth.getUser();if(data&&data.user){const isAdmin=data.user.email===ADMIN_EMAIL;state.user={email:data.user.email,role:isAdmin?"admin":"student"};state.adminAuthed=isAdmin;render();}}catch(e){}}
function goCheckout(plan){const link=plan==="semestre"?CONFIG.STRIPE_LINK_SEMESTRE:CONFIG.STRIPE_LINK_MENSUEL;if(link){window.location.href=link;}else{state.modal=true;renderModal();}}
async function authToken(){if(!sb)return null;try{const{data}=await sb.auth.getSession();return data&&data.session?data.session.access_token:null;}catch(e){return null;}}
async function startCheckout(plan){
  if(CONFIG.FUNCTIONS_URL&&sb&&state.user){
    try{const t=await authToken();const res=await fetch(CONFIG.FUNCTIONS_URL+"/create-checkout",{method:"POST",headers:{"Content-Type":"application/json","Authorization":"Bearer "+t},body:JSON.stringify({plan})});const j=await res.json();if(j&&j.url){window.location.href=j.url;return;}}catch(e){}
  }
  goCheckout(plan);
}
async function downloadProtected(id){
  if(!(CONFIG.FUNCTIONS_URL&&sb&&state.user)){alert("Téléchargement protégé disponible une fois le backend connecté (voir le README).");return;}
  try{const t=await authToken();const res=await fetch(CONFIG.FUNCTIONS_URL+"/download?id="+encodeURIComponent(id),{headers:{"Authorization":"Bearer "+t}});if(!res.ok){alert("Accès refusé : abonnement requis.");return;}const blob=await res.blob();const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download="studia-"+id;document.body.appendChild(a);a.click();a.remove();}catch(e){alert("Erreur : "+e.message);}
}

/* ===== DATA ===== */
const UNIVS=[
 {id:"uca",nom:"Université Côte d'Azur",ville:"Nice",actif:true,facultes:[
   {id:"eg",nom:"Économie & Gestion",mat:{
     L1:["Microéconomie","Macroéconomie","Mathématiques","Statistiques","Comptabilité générale","Introduction à la gestion"],
     L2:["Microéconomie 2","Macroéconomie 2","Comptabilité de gestion","Statistiques inférentielles","Mathématiques financières","Droit des affaires"],
     L3:["Microéconomie approfondie","Économétrie","Analyse financière","Théorie des jeux","Économie publique","Analyse de données"]}},
   {id:"droit",nom:"Droit",mat:{
     L1:["Introduction au droit","Droit civil","Droit constitutionnel","Histoire du droit"],
     L2:["Droit des obligations","Droit administratif","Droit pénal","Droit des affaires"],
     L3:["Contrats spéciaux","Droit du travail","Droit international","Procédure civile"]}},
   {id:"maths",nom:"Mathématiques",mat:{
     L1:["Analyse 1","Algèbre 1","Probabilités","Logique & ensembles"],
     L2:["Analyse 2","Algèbre linéaire","Statistiques","Topologie"],
     L3:["Analyse complexe","Algèbre 2","Probabilités avancées","Calcul différentiel"]}},
 ]},
 {id:"amu",nom:"Aix-Marseille Université",ville:"Aix-en-Provence",actif:false,facultes:[]},
 {id:"p1",nom:"Paris 1 Panthéon-Sorbonne",ville:"Paris",actif:false,facultes:[]},
 {id:"tse",nom:"Toulouse School of Economics",ville:"Toulouse",actif:false,facultes:[]},
];
const TYPES=["Cours","TD","Examen"];
const TUTEURS=[["Léa M.","18"],["Karim B.","17"],["Yanis T.","16"],["Sofia R.","17"]];
const kindLabel={Cours:"Cours",TD:"TD corrigé",Examen:"Examen corrigé"};
const kindIcon={Cours:"📘",TD:"▶",Examen:"📝"};

let _uid=0;
function seedContenus(){
  const out=[]; let t=0;
  for(const u of UNIVS){ if(!u.actif)continue;
    for(const f of u.facultes){
      for(const annee of ["L1","L2","L3"]){
        for(const mat of f.mat[annee]){
          TYPES.forEach((type,k)=>{
            const [tut,note]=TUTEURS[t++%TUTEURS.length];
            const titres={Cours:`Cours : ${mat}`,TD:`TD corrigé : ${mat}`,Examen:`Examen corrigé : ${mat}`};
            out.push({id:"s"+(_uid++),source:"seed",univ:u.id,faculte:f.id,annee,matiere:mat,type,
              titre:titres[type],tuteur:tut,note,duree:(10+((t*3)%16))+" min",
              gratuit:(annee==="L1"&&k===0&&f.id==="eg"&&(mat==="Microéconomie"||mat==="Macroéconomie")),
              ts:Date.now()-(out.length*1000)});
          });
        }
      }
    }
  }
  const fl=out.find(c=>c.univ==="uca"&&c.faculte==="eg"&&c.annee==="L1"&&c.matiere==="Microéconomie"&&c.type==="TD");
  if(fl){fl.titre="Maximisation de l'utilité sous contrainte";fl.gratuit=true;fl.flagship=true;}
  return out;
}

const state={
  view:"landing", univ:null, faculte:null, annee:"L1", matiere:null, tab:"cours", item:null,
  subscribed:false, adminAuthed:false, modal:false, user:null, menu:false, authMode:"login",
  opt:{mode:"coin",corner:"bottom-right",sizePct:8,opacity:.35},
  a:{view:"univ",univ:null,fac:null,niv:"L1",mat:null,tab:"Cours",sort:"recent"},
  contenus:seedContenus(),
};

/* ===== templates ===== */
const CORR=["Énoncé (reformulé)","La méthode","Solution pas à pas","Pièges fréquents","Ce qu'attend le correcteur","Pour aller plus loin"];
const COURS=["L'essentiel","Les notions clés","Définitions & formules à connaître","Les confusions fréquentes"];
const flagship=["Un consommateur de revenu R, biens de prix p1 et p2, utilité U=x1·x2. Déterminer le panier optimal.","On maximise l'utilité sous contrainte budgétaire : Lagrangien, ou TMS = rapport des prix. On pose la contrainte AVANT de dériver.","1) Contrainte p1·x1+p2·x2=R. 2) Lagrangien. 3) Conditions du 1er ordre. 4) TMS=p1/p2. 5) x1*=R/2p1, x2*=R/2p2.","Oublier la condition du 2nd ordre. Confondre TMS et rapport des prix. Ne pas interpréter le résultat.","Une démarche ordonnée et SURTOUT l'interprétation économique. Le calcul juste sans interprétation = la moyenne.","Refais avec U=x1^a·x2^b — tu retrouveras la part du revenu allouée à chaque bien."];
const corrTpl=t=>[`Reformulation claire de « ${t} », sans jargon.`,"L'angle d'attaque et le réflexe méthodologique avant tout calcul.","Résolution détaillée, étape par étape, comme sur la copie.","Les erreurs classiques qui coûtent des points.","Le barème et ce que le correcteur valorise.","Une variante pour vérifier la maîtrise."];
const coursTpl=t=>[`Le cœur de « ${t} » résumé sans remplissage.`,"Les concepts incontournables, avec exemples concrets.","Définitions et formules à savoir par cœur.","Les points souvent compris de travers."];

/* ===== derived ===== */
const univById=id=>UNIVS.find(u=>u.id===id);
const facById=(uid,fid)=>{const u=univById(uid);return u&&u.facultes.find(f=>f.id===fid);};
const matieresFor=(uid,fid,annee)=>{const f=facById(uid,fid);const m1=(f&&f.mat&&f.mat[annee])?f.mat[annee]:[];const m2=state.contenus.filter(c=>c.univ===uid&&c.faculte===fid&&c.annee===annee).map(c=>c.matiere);return[...new Set([...m1,...m2])]};
const countMat=(uid,fid,annee,m,type)=>state.contenus.filter(c=>c.univ===uid&&c.faculte===fid&&c.annee===annee&&c.matiere===m&&c.type===type).length;
const itemsFor=(uid,fid,annee,m,type)=>state.contenus.filter(c=>c.univ===uid&&c.faculte===fid&&c.annee===annee&&c.matiere===m&&c.type===type);
const esc=s=>(s||"").replace(/&/g,"&amp;").replace(/"/g,"&quot;").replace(/</g,"&lt;");

/* ===== handlers (public) ===== */
function nav(v){state.view=v;render();}
function goProgramme(){ state.view = state.faculte?"programme":(state.univ?"facultes":"univs"); render(); }
function selectUniv(id){const u=univById(id);if(!u||!u.actif)return;state.univ=u;state.faculte=null;state.view="facultes";render();}
function selectFaculte(fid){const f=facById(state.univ.id,fid);if(!f)return;state.faculte=f;state.annee="L1";state.view="programme";render();}
function pickAnnee(a){state.annee=a;render();}
function openMatiere(idx){const m=matieresFor(state.univ.id,state.faculte.id,state.annee)[idx];if(m==null)return;state.matiere=m;state.tab="cours";state.view="matiere";render();}
function setTab(t){state.tab=t;render();}
function openItem(id){state.item=state.contenus.find(c=>c.id===id);state.view="detail";render();}
function setModal(v){state.modal=v;renderModal();}
function subscribe(){state.subscribed=true;state.modal=false;renderModal();render();}
function setAuthMode(m){state.authMode=m;render();}
function toggleMenu(){state.menu=!state.menu;render();}
function loginAdmin(){state.user={email:ADMIN_EMAIL,role:"admin"};state.adminAuthed=true;state.a.view="univ";state.view="admin";state.menu=false;render();}
function loginStudent(email){state.user={email,role:"student"};state.adminAuthed=false;state.view="univs";state.menu=false;render();}
async function doAuth(){
  const email=(document.getElementById("authEmail").value||"").trim();
  const pass=(document.getElementById("authPass").value||"");
  const err=document.getElementById("authErr");
  if(!email||!pass){if(err)err.textContent="Renseigne ton email et ton mot de passe.";return;}
  if(sb){
    try{
      const {data,error}=await (state.authMode==="signup"?sb.auth.signUp({email,password:pass}):sb.auth.signInWithPassword({email,password:pass}));
      if(error){if(err)err.textContent=error.message;return;}
      const isAdmin=email===ADMIN_EMAIL;state.user={email,role:isAdmin?"admin":"student"};state.adminAuthed=isAdmin;state.view=isAdmin?"admin":"univs";state.menu=false;render();return;
    }catch(e){if(err)err.textContent=e.message;return;}
  }
  loginStudent(email); // mode démo (sans Supabase configuré)
}
async function googleAuth(){if(sb){try{await sb.auth.signInWithOAuth({provider:"google"});}catch(e){}}else{loginStudent("etudiant@exemple.fr");}}
function logout(){if(sb){try{sb.auth.signOut();}catch(e){}}state.user=null;state.adminAuthed=false;state.menu=false;state.view="landing";render();}

/* ===== RENDER ===== */
function render(){
  if(typeof scanStream!=="undefined"&&scanStream)stopScan();
  const app=document.getElementById("app");
  if(state.view==="landing"){app.innerHTML=Landing();window.scrollTo(0,0);return;}
  if(state.view==="login"){app.innerHTML=Nav()+LoginView()+Footer();window.scrollTo(0,0);return;}
  let h=Nav();
  const v=state.view;
  if(v==="univs")h+=UnivsView();
  else if(v==="facultes")h+=FacultesView();
  else if(v==="programme")h+=Ctx()+Programme();
  else if(v==="matiere")h+=Ctx()+MatiereView();
  else if(v==="detail")h+=Ctx()+Detail();
  else if(v==="tarifs")h+=Tarifs();
  else if(v==="tuteur")h+=Tuteur();
  else if(v==="admin")h+=AdminConsole();
  h+=Footer();
  app.innerHTML=h;
  if(v==="admin"&&state.a.view==="manage")bindAdmin();
  window.scrollTo(0,0);
}

/* ===== Landing ===== */
function Landing(){
  return `<div class="fade">${Nav()}
  <div class="hero" style="position:relative">
    <div class="hero-img"><img src="https://loremflickr.com/1400/760/university,library,study?lock=7" onerror="this.remove()"/></div>
    <div class="wrap" style="position:relative;z-index:1;padding:88px 0 64px;max-width:760px">
      <span class="pill">Par les étudiants, pour les étudiants</span>
      <h1 class="serif" style="font-size:clamp(40px,6.5vw,68px);line-height:1.04;color:var(--ink);margin:20px 0 18px">Comprendre, s'entraîner, réussir.</h1>
      <p style="font-size:20px;line-height:1.55;color:var(--sub);margin:0 0 30px;max-width:600px">Cours, TD et examens corrigés — expliqués en vidéo par les majors de ta promo. Pour que chaque étudiant ait vraiment les moyens de réussir sa licence.</p>
      <div style="display:flex;gap:12px;flex-wrap:wrap"><button class="btn btn-ink btn-lg" onclick="nav('univs')">Choisir ma fac →</button><button class="btn btn-ghost btn-lg" onclick="nav('tuteur')">Devenir tuteur</button></div>
    </div>
  </div>

/* ===== QR + watermark ===== */
function genId(){return Math.random().toString(36).slice(2,8);}
function today(){return new Date().toISOString().slice(0,10);}
function fileToDataURL(f){return new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result);r.onerror=rej;r.readAsDataURL(f);});}
function loadImage(s){return new Promise((res,rej)=>{const i=new Image();i.onload=()=>res(i);i.onerror=rej;i.src=s;});}
function makeQR(text,size){return new Promise(res=>{const h=document.createElement("div");document.getElementById("qrfactory").appendChild(h);new QRCode(h,{text,width:size,height:size,correctLevel:QRCode.CorrectLevel.M});setTimeout(()=>{const cv=h.querySelector("canvas");const u=cv?cv.toDataURL("image/png"):h.querySelector("img").src;h.remove();res(u);},40);});}
function placeOnCanvas(ctx,W,H,qr,o){
  const min=Math.min(W,H), s=Math.max(24,Math.round(min*o.sizePct/100)), pad=Math.round(min*.02);
  if(o.mode==="mosaique"){const gap=s*1.7;ctx.globalAlpha=o.opacity;for(let y=pad;y<H;y+=gap)for(let x=pad;x<W;x+=gap)ctx.drawImage(qr,x,y,s,s);ctx.globalAlpha=1;}
  else if(o.mode==="bandeau"){const n=Math.max(1,Math.floor(W/(s*1.6)));ctx.globalAlpha=Math.min(1,o.opacity+.08);ctx.fillStyle="#fff";ctx.fillRect(0,H-s-pad*2,W,s+pad*2);ctx.globalAlpha=o.opacity;for(let i=0;i<n;i++){const x=(i+.5)*(W/n)-s/2;ctx.drawImage(qr,x,H-s-pad,s,s);}ctx.globalAlpha=1;}
  else{let x=pad,y=pad;if(o.corner.includes("right"))x=W-s-pad;if(o.corner.includes("bottom"))y=H-s-pad;ctx.globalAlpha=Math.min(1,o.opacity+.15);ctx.fillStyle="#fff";ctx.fillRect(x-2,y-2,s+4,s+4);ctx.globalAlpha=o.opacity;ctx.drawImage(qr,x,y,s,s);ctx.globalAlpha=1;}
}
async function watermarkImage(file,token){
  const img=await loadImage(await fileToDataURL(file));
  const cv=document.createElement("canvas");cv.width=img.naturalWidth;cv.height=img.naturalHeight;
  const ctx=cv.getContext("2d");ctx.drawImage(img,0,0);
  const qr=await loadImage(await makeQR(token,160));
  placeOnCanvas(ctx,cv.width,cv.height,qr,state.opt);
  return cv.toDataURL("image/png");
}
async function watermarkPDF(file,token){
  const doc=await PDFLib.PDFDocument.load(await file.arrayBuffer(),{ignoreEncryption:true});
  const png=await doc.embedPng(await (await fetch(await makeQR(token,256))).arrayBuffer());
  const o=state.opt;
  doc.getPages().forEach(p=>{const{width:W,height:H}=p.getSize();const min=Math.min(W,H),s=Math.max(20,min*o.sizePct/100),pad=min*.03;
    if(o.mode==="mosaique"){const gap=s*1.7;for(let y=pad;y<H;y+=gap)for(let x=pad;x<W;x+=gap)p.drawImage(png,{x,y,width:s,height:s,opacity:o.opacity});}
    else if(o.mode==="bandeau"){const n=Math.max(1,Math.floor(W/(s*1.6)));for(let i=0;i<n;i++){const x=(i+.5)*(W/n)-s/2;p.drawImage(png,{x,y:pad,width:s,height:s,opacity:o.opacity});}}
    else{let x=pad,y=pad;if(o.corner.includes("right"))x=W-s-pad;if(o.corner.includes("top"))y=H-s-pad;p.drawImage(png,{x,y,width:s,height:s,opacity:o.opacity});}
  });
  return URL.createObjectURL(new Blob([await doc.save()],{type:"application/pdf"}));
}
async function processRecord(c){
  c.token=`STUDIA|${c.id}|c:${c.account}|${c.date}`;
  c.qr=await makeQR(c.token,160);
  try{if(c.kind==="image"){c.outUrl=await watermarkImage(c.file,c.token);c.outName=c.titre.replace(/\.[^.]+$/,"")+"_tatoue.png";c.thumb=c.outUrl;}
    else{c.outUrl=await watermarkPDF(c.file,c.token);c.outName=c.titre.replace(/\.[^.]+$/,"")+"_tatoue.pdf";}c.error=null;
  }catch(e){c.error="Échec : "+e.message;}
}
async function handleFiles(files){
  const a=state.a;
  for(const file of files){
    const kind=file.type==="application/pdf"?"pdf":(file.type.startsWith("image/")?"image":null);if(!kind)continue;
    const c={id:genId(),source:"upload",kind,file,
      univ:a.univ.id,faculte:a.fac.id,annee:a.niv,matiere:a.mat,type:a.tab,
      account:ACCOUNT,email:ADMIN_EMAIL,date:today(),ts:Date.now(),
      titre:file.name,tuteur:"—",note:"—",duree:"",gratuit:false,qr:null,outUrl:null,thumb:null,error:null};
    if(kind==="image")c.thumb=await fileToDataURL(file);

    // --- NOUVEAU : Sauvegarde sur Supabase ---
    if(sb){
      const fileName = c.id + (kind === "pdf" ? ".pdf" : ".png");
      // 1. Upload dans le bucket Storage privé
      await sb.storage.from("sujets").upload(fileName, file);
      
      // 2. Création de la ligne dans la base de données
      await sb.from("contenus").insert([{
        id: c.id, source: c.source, univ: c.univ, faculte: c.faculte, annee: c.annee,
        matiere: c.matiere, type: c.type, titre: c.titre, tuteur: c.tuteur,
        note: c.note, duree: c.duree, gratuit: c.gratuit, account: c.account,
        email: c.email, date: c.date, ts: c.ts, file_path: fileName
      }]);
    }
    // ------------------------------------------

    state.contenus.push(c);render();
    await processRecord(c);render();
  }
}
async function regen(id){const c=state.contenus.find(x=>x.id===id);if(!c)return;c.outUrl=null;c.qr=null;render();await processRecord(c);render();}
var scanStream=null, scanRAF=null;
function resolveToken(str){
  const out=document.getElementById("to"); if(!out)return;
  const v=(str||"").trim(); if(!v){out.innerHTML="";return;}
  const m=v.match(/STUDIA\|([a-z0-9]+)/i)||v.match(/^([a-z0-9]{6})$/i);
  const id=m?m[1]:v;
  const c=state.contenus.find(x=>x.id===id||x.token===v);
  if(!c){out.innerHTML=`<div class="trace-result miss">Code lu : ${esc(v)} — aucun contenu de cette session ne correspond. (Avec le backend : recherche dans toute la base.)</div>`;return;}
  const u=univById(c.univ), fac=facById(c.univ,c.faculte);
  const rows=[["Compte",c.account||"—"],["Email",c.email||"—"],["Sujet",esc(c.titre)],["Emplacement",`${u?u.ville:""} ▸ ${fac?fac.nom:c.faculte} ▸ ${c.annee} ▸ ${c.matiere} ▸ ${kindLabel[c.type]}`],["Date",c.date||"—"],["ID",`<span class="token">${c.id}</span>`]];
  out.innerHTML=`<div class="trace-result"><b>Fuite tracée ✓</b><div style="margin-top:8px;display:grid;grid-template-columns:auto 1fr;gap:5px 12px;font-size:13px">${rows.map(([k,val])=>`<span style="color:var(--sub)">${k}</span><span>${val}</span>`).join("")}</div><div class="muted" style="margin-top:8px">Email/IP réels = liés à l'abonné au moment du téléchargement (backend).</div></div>`;
}
function traceText(){resolveToken(document.getElementById("ti").value);}
async function traceImage(input){
  const f=input.files[0]; if(!f)return; input.value="";
  if(typeof jsQR==="undefined"){document.getElementById("to").innerHTML='<div class="trace-result miss">Lecteur QR non chargé (réseau).</div>';return;}
  try{const img=await loadImage(await fileToDataURL(f));const cv=document.createElement("canvas");cv.width=img.naturalWidth;cv.height=img.naturalHeight;const ctx=cv.getContext("2d");ctx.drawImage(img,0,0);const d=ctx.getImageData(0,0,cv.width,cv.height);const code=jsQR(d.data,cv.width,cv.height);if(code)resolveToken(code.data);else document.getElementById("to").innerHTML='<div class="trace-result miss">Aucun QR détecté sur cette image.</div>';}
  catch(e){document.getElementById("to").innerHTML='<div class="trace-result miss">Erreur de lecture : '+e.message+'</div>';}
}
async function startScan(){
  const v=document.getElementById("scanVid");
  if(typeof jsQR==="undefined"){document.getElementById("to").innerHTML='<div class="trace-result miss">Lecteur QR non chargé (réseau).</div>';return;}
  try{
    scanStream=await navigator.mediaDevices.getUserMedia({video:{facingMode:"environment"}});
    v.srcObject=scanStream;await v.play();
    document.getElementById("scanWrap").style.display="block";
    document.getElementById("scanStart").style.display="none";
    document.getElementById("scanStop").style.display="inline-flex";
    scanTick();
  }catch(e){document.getElementById("to").innerHTML='<div class="trace-result miss">Caméra indisponible ('+e.message+'). Utilise « Importer une image ».</div>';}
}
function scanTick(){
  const v=document.getElementById("scanVid");
  if(!v||!scanStream)return;
  if(v.readyState>=2&&v.videoWidth){
    const cv=document.createElement("canvas");cv.width=v.videoWidth;cv.height=v.videoHeight;
    const ctx=cv.getContext("2d");ctx.drawImage(v,0,0,cv.width,cv.height);
    const d=ctx.getImageData(0,0,cv.width,cv.height);
    const code=jsQR(d.data,cv.width,cv.height);
    if(code){stopScan();resolveToken(code.data);return;}
  }
  scanRAF=requestAnimationFrame(scanTick);
}
function stopScan(){
  if(scanRAF)cancelAnimationFrame(scanRAF);scanRAF=null;
  if(scanStream){scanStream.getTracks().forEach(t=>t.stop());scanStream=null;}
  const w=document.getElementById("scanWrap");if(w)w.style.display="none";
  const s=document.getElementById("scanStart"),st=document.getElementById("scanStop");if(s)s.style.display="inline-flex";if(st)st.style.display="none";
}

}
